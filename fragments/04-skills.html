<!-- ============================================================
     04-skills.html — SkillsAgent
     Skill Matrix: Category tabs + compact SVG dots grid
     Fragmento parcial: sin <html>, <head>, <body>
     ============================================================ -->

<!-- ===================== STYLES ===================== -->
<style>
  /* -------------------------------------------------------
     SKILLS SECTION — scoped to .skills-section
     ------------------------------------------------------- */

  .skills-section {
    padding-block: var(--space-12);
  }

  /* Section header */
  .skills-section__header {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-6);
    border-bottom: var(--border);
    padding-bottom: var(--space-4);
  }

  .skills-section__title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .skills-section__subtitle {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  /* -------------------------------------------------------
     TABS ROW
     ------------------------------------------------------- */
  .skills-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border-bottom: var(--border);
    margin-bottom: var(--space-5);
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .skills-tabs::-webkit-scrollbar {
    display: none;
  }

  .skills-tab {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-4);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--color-text-muted);
    white-space: nowrap;
    transition: color var(--transition-fast), border-color var(--transition-fast);
    min-height: 44px;
    position: relative;
  }

  .skills-tab:hover {
    color: var(--color-text);
  }

  .skills-tab[aria-selected="true"] {
    font-weight: var(--weight-bold);
    color: var(--color-text);
  }

  /* Active indicator color per category */
  .skills-tab[aria-selected="true"][data-cat="data_engineering"] {
    border-bottom-color: var(--color-primary);
    color: var(--color-primary);
  }
  .skills-tab[aria-selected="true"][data-cat="visualization"] {
    border-bottom-color: var(--color-blue);
    color: var(--color-blue);
  }
  .skills-tab[aria-selected="true"][data-cat="cloud"] {
    border-bottom-color: var(--color-orange);
    color: var(--color-orange);
  }
  .skills-tab[aria-selected="true"][data-cat="languages"] {
    border-bottom-color: var(--color-success);
    color: var(--color-success);
  }
  .skills-tab[aria-selected="true"][data-cat="tools"] {
    border-bottom-color: var(--color-purple);
    color: var(--color-purple);
  }

  /* Skill count badge */
  .skills-tab__badge {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    font-weight: 400;
  }

  /* -------------------------------------------------------
     PANEL
     ------------------------------------------------------- */
  .skills-panel {
    display: none;
  }

  .skills-panel--active {
    display: block;
  }

  /* 3-col on desktop, 2-col on tablet, 1-col on mobile */
  .skills-panel__grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }

  @media (min-width: 540px) {
    .skills-panel__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 768px) {
    .skills-panel__grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  /* -------------------------------------------------------
     COMPACT SKILL ROW — ~32px height
     ------------------------------------------------------- */
  .skill-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    padding: var(--space-1) var(--space-2);
    min-height: 32px;
    border-radius: var(--radius-md);
    position: relative;
    transition: background-color var(--transition-fast);
  }

  .skill-row:hover {
    background-color: var(--color-surface-2);
  }

  .skill-row__name {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  /* -------------------------------------------------------
     SVG DOTS WRAPPER + TOOLTIP
     ------------------------------------------------------- */
  .skill-dots {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }

  .skill-dots svg {
    display: block;
    overflow: visible;
  }

  /* Tooltip */
  .skill-dots__tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    z-index: 30;
    background-color: var(--color-surface);
    border: 1px solid var(--color-divider);
    border-radius: var(--radius-md);
    padding: var(--space-1) var(--space-2);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity var(--transition-fast), transform var(--transition-fast);
    box-shadow: var(--shadow-md);
  }

  /* Show tooltip on hover over the full row */
  .skill-row:hover .skill-dots__tooltip,
  .skill-dots:focus-within .skill-dots__tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  /* Transition for fill animation */
  .skill-dot-circle {
    transition: fill 200ms ease-in-out;
  }
</style>

<!-- ===================== HTML ===================== -->
<section id="skills" class="skills-section" aria-label="Skills">
  <div class="skills-section__header">
    <h2 class="skills-section__title" data-i18n="nav.skills"></h2>
    <span class="skills-section__subtitle" aria-hidden="true">skill matrix</span>
  </div>

  <!-- Tab bar — populated by JS -->
  <div class="skills-tabs" role="tablist" id="skills-tabs" aria-label="Skill categories"></div>

  <!-- Panels container — populated by JS -->
  <div id="skills-panels"></div>
</section>

<!-- ===================== SCRIPT ===================== -->
<script>
(function () {
  "use strict";

  /* -------------------------------------------------------
     CONSTANTS
     ------------------------------------------------------- */
  var CATEGORY_ORDER = [
    "data_engineering",
    "visualization",
    "cloud",
    "languages",
    "tools"
  ];

  var CATEGORY_COLORS = {
    data_engineering: "var(--color-primary)",
    visualization:    "var(--color-blue)",
    cloud:            "var(--color-orange)",
    languages:        "var(--color-success)",
    tools:            "var(--color-purple)"
  };

  var DEFAULT_TAB = "data_engineering";

  // Dot geometry — radius 4px, gap 3px → 5 dots = 5*8 + 4*3 = 52px wide, 8px tall
  var DOT_R     = 4;
  var DOT_GAP   = 3;
  var DOT_DIAM  = DOT_R * 2;         // 8
  var DOT_STEP  = DOT_DIAM + DOT_GAP; // 11
  var DOT_TOTAL = 5;
  var SVG_W     = DOT_TOTAL * DOT_STEP - DOT_GAP; // 52
  var SVG_H     = DOT_DIAM;                        // 8

  var ANIM_DELAYS = [0, 80, 160, 240, 320]; // ms per dot

  /* -------------------------------------------------------
     STATE — tracks which categories have been animated
     ------------------------------------------------------- */
  var _animated = {}; // cat → true once animated
  // Records per category: { cat, circles:[], level, color, animated }
  var _dotRecords = {}; // cat → [ record, ... ]

  var _activeTab = null;
  var _observerFired = false;

  /* -------------------------------------------------------
     TOOLTIP TEXT
     ------------------------------------------------------- */
  function _tooltipText(years, level) {
    var fmt = t(CV_DATA.ui.skills.tooltip_format);
    return fmt
      .replace("{years}", years)
      .replace("{level}", level);
  }

  /* -------------------------------------------------------
     SVG DOT BUILDER
     All dots start empty; animation fills them later.
     ------------------------------------------------------- */
  function _buildDotSVG(level, filledColor) {
    var ns = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("width", SVG_W);
    svg.setAttribute("height", SVG_H);
    svg.setAttribute("viewBox", "0 0 " + SVG_W + " " + SVG_H);
    svg.setAttribute("aria-hidden", "true");
    svg.setAttribute("focusable", "false");

    var circles = [];
    for (var i = 0; i < DOT_TOTAL; i++) {
      var cx = DOT_R + i * DOT_STEP;
      var cy = DOT_R;

      var circle = document.createElementNS(ns, "circle");
      circle.setAttribute("cx", cx);
      circle.setAttribute("cy", cy);
      circle.setAttribute("r", DOT_R);
      circle.setAttribute("rx", "var(--radius-full)");
      circle.setAttribute("class", "skill-dot-circle");
      circle.setAttribute("fill", "var(--color-surface-2)");
      circle.setAttribute("stroke", "var(--color-surface-offset)");
      circle.setAttribute("stroke-width", "1");

      svg.appendChild(circle);
      circles.push(circle);
    }

    return { svg: svg, circles: circles, level: level, color: filledColor };
  }

  /* -------------------------------------------------------
     ANIMATE DOTS — fill left-to-right, once only
     ------------------------------------------------------- */
  function _animateCategory(cat) {
    if (_animated[cat]) return;
    _animated[cat] = true;

    var records = _dotRecords[cat] || [];
    records.forEach(function (record) {
      for (var i = 0; i < DOT_TOTAL; i++) {
        (function (circle, idx, level, color) {
          setTimeout(function () {
            if (idx < level) {
              circle.setAttribute("fill", color);
              circle.setAttribute("stroke", color);
            }
          }, ANIM_DELAYS[idx]);
        })(record.circles[i], i, record.level, record.color);
      }
    });
  }

  /* -------------------------------------------------------
     BUILD PANEL for a category
     ------------------------------------------------------- */
  function _buildPanel(cat) {
    var skills = CV_DATA.skills[cat];
    if (!skills || !skills.length) return null;

    var color = CATEGORY_COLORS[cat] || "var(--color-primary)";

    var panel = document.createElement("div");
    panel.className = "skills-panel";
    panel.setAttribute("role", "tabpanel");
    panel.setAttribute("id", "skills-panel-" + cat);
    panel.setAttribute("aria-labelledby", "skills-tab-" + cat);
    panel.setAttribute("data-cat", cat);

    var grid = document.createElement("ul");
    grid.className = "skills-panel__grid";
    grid.style.listStyle = "none";
    grid.style.margin = "0";
    grid.style.padding = "0";

    _dotRecords[cat] = [];

    skills.forEach(function (skill) {
      var li = document.createElement("li");
      li.className = "skill-row";

      // Skill name
      var nameSpan = document.createElement("span");
      nameSpan.className = "skill-row__name";
      nameSpan.textContent = skill.name;

      // Dots wrapper
      var dotsWrap = document.createElement("div");
      dotsWrap.className = "skill-dots";
      dotsWrap.setAttribute("role", "img");
      dotsWrap.setAttribute("aria-label", skill.name + " — " + _tooltipText(skill.years, skill.level));
      dotsWrap.setAttribute("data-years", skill.years);
      dotsWrap.setAttribute("data-level", skill.level);
      dotsWrap.setAttribute("data-skill-name", skill.name);
      dotsWrap.setAttribute("data-cat", cat);

      // Tooltip
      var tooltip = document.createElement("span");
      tooltip.className = "skill-dots__tooltip";
      tooltip.setAttribute("role", "tooltip");
      tooltip.setAttribute("aria-hidden", "true");
      tooltip.textContent = _tooltipText(skill.years, skill.level);

      // SVG
      var dotResult = _buildDotSVG(skill.level, color);
      _dotRecords[cat].push({
        circles: dotResult.circles,
        level:   dotResult.level,
        color:   dotResult.color
      });

      dotsWrap.appendChild(dotResult.svg);
      dotsWrap.appendChild(tooltip);

      li.appendChild(nameSpan);
      li.appendChild(dotsWrap);
      grid.appendChild(li);
    });

    panel.appendChild(grid);
    return panel;
  }

  /* -------------------------------------------------------
     RENDER TABS AND PANELS
     ------------------------------------------------------- */
  function _render() {
    var tabsEl   = document.getElementById("skills-tabs");
    var panelsEl = document.getElementById("skills-panels");
    if (!tabsEl || !panelsEl) return;

    tabsEl.innerHTML   = "";
    panelsEl.innerHTML = "";
    _dotRecords = {};
    _animated   = {};
    _activeTab  = null;

    CATEGORY_ORDER.forEach(function (cat) {
      var skills = CV_DATA.skills[cat];
      if (!skills || !skills.length) return;

      var label = t(CV_DATA.ui.skills.categories[cat]);
      var count = skills.length;

      // Tab button
      var tab = document.createElement("button");
      tab.className = "skills-tab";
      tab.setAttribute("role", "tab");
      tab.setAttribute("id", "skills-tab-" + cat);
      tab.setAttribute("aria-controls", "skills-panel-" + cat);
      tab.setAttribute("aria-selected", "false");
      tab.setAttribute("data-cat", cat);
      tab.setAttribute("tabindex", cat === DEFAULT_TAB ? "0" : "-1");

      var labelSpan = document.createElement("span");
      labelSpan.setAttribute("data-tab-label", cat);
      labelSpan.textContent = label;

      var badgeSpan = document.createElement("span");
      badgeSpan.className = "skills-tab__badge";
      badgeSpan.textContent = "(" + count + ")";

      tab.appendChild(labelSpan);
      tab.appendChild(badgeSpan);
      tabsEl.appendChild(tab);

      // Panel
      var panel = _buildPanel(cat);
      if (panel) panelsEl.appendChild(panel);

      // Click handler
      tab.addEventListener("click", function () {
        _selectTab(cat);
      });

      // Keyboard navigation (roving tabindex)
      tab.addEventListener("keydown", function (e) {
        var tabs = Array.from(tabsEl.querySelectorAll(".skills-tab"));
        var idx  = tabs.indexOf(tab);
        if (e.key === "ArrowRight" || e.key === "ArrowDown") {
          e.preventDefault();
          var next = tabs[(idx + 1) % tabs.length];
          next.focus();
          _selectTab(next.getAttribute("data-cat"));
        } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
          e.preventDefault();
          var prev = tabs[(idx - 1 + tabs.length) % tabs.length];
          prev.focus();
          _selectTab(prev.getAttribute("data-cat"));
        }
      });
    });

    // Activate default tab (no animation yet — wait for IntersectionObserver)
    _selectTab(DEFAULT_TAB, /* skipAnim */ true);
  }

  /* -------------------------------------------------------
     SELECT TAB
     skipAnim = true → show panel but don't fire animation
     (used on init; observer triggers animation separately)
     ------------------------------------------------------- */
  function _selectTab(cat, skipAnim) {
    var tabsEl = document.getElementById("skills-tabs");
    if (!tabsEl) return;

    // Deactivate all
    tabsEl.querySelectorAll(".skills-tab").forEach(function (t) {
      t.setAttribute("aria-selected", "false");
      t.setAttribute("tabindex", "-1");
    });
    document.querySelectorAll(".skills-panel").forEach(function (p) {
      p.classList.remove("skills-panel--active");
    });

    // Activate selected
    var tab   = document.getElementById("skills-tab-" + cat);
    var panel = document.getElementById("skills-panel-" + cat);
    if (!tab || !panel) return;

    tab.setAttribute("aria-selected", "true");
    tab.setAttribute("tabindex", "0");
    panel.classList.add("skills-panel--active");
    _activeTab = cat;

    // Animate if observer already fired (i.e. section is visible)
    if (!skipAnim && _observerFired) {
      _animateCategory(cat);
    }
  }

  /* -------------------------------------------------------
     INTERSECTION OBSERVER
     Animates the default (active) tab on first viewport entry.
     Does NOT re-animate on re-entry.
     ------------------------------------------------------- */
  function _setupObserver() {
    var section = document.getElementById("skills");
    if (!section) return;

    if (!("IntersectionObserver" in window)) {
      // Fallback: animate active tab immediately
      _observerFired = true;
      if (_activeTab) _animateCategory(_activeTab);
      return;
    }

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting && !_observerFired) {
          _observerFired = true;
          if (_activeTab) _animateCategory(_activeTab);
          observer.disconnect();
        }
      });
    }, { threshold: 0.3 });

    observer.observe(section);
  }

  /* -------------------------------------------------------
     i18n REFRESH — tab labels + tooltips
     Dots are NOT re-rendered on language change.
     ------------------------------------------------------- */
  function _refreshLabels() {
    // Tab labels
    document.querySelectorAll("[data-tab-label]").forEach(function (el) {
      var cat = el.getAttribute("data-tab-label");
      var label = CV_DATA.ui.skills.categories[cat];
      if (label) el.textContent = t(label);
    });

    // Tooltip strings and aria-labels
    document.querySelectorAll(".skill-dots[data-skill-name]").forEach(function (wrap) {
      var years = parseInt(wrap.getAttribute("data-years"), 10);
      var level = parseInt(wrap.getAttribute("data-level"), 10);
      var name  = wrap.getAttribute("data-skill-name");
      var tt    = _tooltipText(years, level);

      wrap.setAttribute("aria-label", name + " — " + tt);
      var tooltipEl = wrap.querySelector(".skill-dots__tooltip");
      if (tooltipEl) tooltipEl.textContent = tt;
    });
  }

  window.addEventListener("cv:languagechange", _refreshLabels);

  /* -------------------------------------------------------
     INIT
     ------------------------------------------------------- */
  function _init() {
    _render();
    _setupObserver();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", _init);
  } else {
    _init();
  }

})();
</script>
