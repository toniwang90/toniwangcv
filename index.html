      liLink.className = "hero__contact-link";
      liLink.href = profile.contact.linkedin;
      liLink.target = "_blank";
      liLink.rel = "noopener noreferrer";
      liLink.setAttribute("aria-label", "LinkedIn");
      liLink.appendChild(_makeIcon("linkedin", 16));
      var liSpan = document.createElement("span");
      liSpan.textContent = "LinkedIn";
      liLink.appendChild(liSpan);
      contactDiv.appendChild(liLink);
    }

    if (profile.contact.email) {
      var mailLink = document.createElement("a");
      mailLink.className = "hero__contact-link hero__contact-link--email";
      mailLink.href = "mailto:" + profile.contact.email;
      mailLink.setAttribute("aria-label", profile.contact.email);
      mailLink.appendChild(_makeIcon("mail", 16));
      var mailSpan = document.createElement("span");
      mailSpan.textContent = profile.contact.email;
      mailLink.appendChild(mailSpan);
      contactDiv.appendChild(mailLink);
    }

    aside.appendChild(contactDiv);

    /* — Assemble hero — */
    var hero = document.createElement("div");
    hero.className = "hero";
    hero.appendChild(identity);
    hero.appendChild(summaryCol);
    hero.appendChild(aside);

    el.innerHTML = "";
    el.appendChild(hero);
  }

  /* -------------------------------------------------------
     RENDER: PROYECTOS
     --- Selecciona los 3 primeros proyectos de la experience
         (los más recientes / relevantes)
     ------------------------------------------------------- */
  function renderProyectos() {
    var el = document.getElementById("proyectos-content");
    if (!el) return;

    // Collect all projects from experience with reference to parent experience
    var allProjects = [];
    CV_DATA.experience.forEach(function (exp) {
      if (exp.projects && exp.projects.length > 0) {
        exp.projects.forEach(function (proj) {
          allProjects.push({ project: proj, exp: exp });
        });
      }
    });

    // Take the first 3 (Fever Lead DE projects — most recent, most relevant)
    var featured = allProjects.slice(0, 3);

    // Header
    var header = document.createElement("div");
    header.className = "section-header";
    var sectionTitle = document.createElement("h2");
    sectionTitle.className = "section-header__title";
    sectionTitle.textContent = t(CV_DATA.ui.sections.projects);
    header.appendChild(sectionTitle);
    var countSpan = document.createElement("span");
    countSpan.className = "section-header__count";
    countSpan.textContent = featured.length;
    header.appendChild(countSpan);

    // Grid
    var grid = document.createElement("div");
    grid.className = "projects-grid";

    featured.forEach(function (item) {
      var proj = item.project;
      var exp = item.exp;

      var card = document.createElement("div");
      card.className = "project-card";

      // Header row
      var cardHeader = document.createElement("div");
      cardHeader.className = "project-card__header";

      var nameEl = document.createElement("h3");
      nameEl.className = "project-card__name";
      nameEl.textContent = t(proj.name);
      cardHeader.appendChild(nameEl);

      var companyEl = document.createElement("span");
      companyEl.className = "project-card__company";
      companyEl.textContent = exp.company;
      cardHeader.appendChild(companyEl);

      card.appendChild(cardHeader);

      // Description
      var descEl = document.createElement("p");
      descEl.className = "project-card__description";
      descEl.textContent = t(proj.description);
      card.appendChild(descEl);

      // Outcome
      if (proj.outcome) {
        var outcomeEl = document.createElement("div");
        outcomeEl.className = "project-card__outcome";
        outcomeEl.textContent = t(proj.outcome);
        card.appendChild(outcomeEl);
      }

      // Stack badges
      if (proj.stack && proj.stack.length > 0) {
        var stackDiv = document.createElement("div");
        stackDiv.className = "project-card__stack";
        proj.stack.forEach(function (tech) {
          var badge = document.createElement("span");
          badge.className = "badge";
          badge.textContent = tech;
          stackDiv.appendChild(badge);
        });
        card.appendChild(stackDiv);
      }

      // Link to experience section
      var linkEl = document.createElement("a");
      linkEl.className = "project-card__link";
      linkEl.href = "#experiencia";
      linkEl.textContent = t(CV_DATA.ui.actions.view_in_experience);
      card.appendChild(linkEl);

      grid.appendChild(card);
    });

    el.innerHTML = "";
    el.appendChild(header);
    el.appendChild(grid);
  }

  /* -------------------------------------------------------
     RENDER: EDUCACIÓN + CERTIFICACIONES + IDIOMAS + RECONOCIMIENTOS
     ------------------------------------------------------- */
  function renderEducacion() {
    var el = document.getElementById("educacion-content");
    if (!el) return;

    el.innerHTML = "";

    /* --- EDUCACIÓN --- */
    var eduBlock = document.createElement("div");
    eduBlock.className = "edu-block";

    var eduHeader = document.createElement("div");
    eduHeader.className = "section-header";
    var eduTitle = document.createElement("h2");
    eduTitle.className = "section-header__title";
    eduTitle.textContent = t(CV_DATA.ui.nav.education);
    eduHeader.appendChild(eduTitle);
    eduBlock.appendChild(eduHeader);

    var eduList = document.createElement("div");
    eduList.className = "edu-list";

    CV_DATA.education.forEach(function (edu) {
      var card = document.createElement("div");
      card.className = "edu-card";

      var main = document.createElement("div");
      main.className = "edu-card__main";

      var instEl = document.createElement("p");
      instEl.className = "edu-card__institution";
      instEl.textContent = edu.institution;
      main.appendChild(instEl);

      var degreeEl = document.createElement("p");
      degreeEl.className = "edu-card__degree";
      degreeEl.textContent = t(edu.degree);
      main.appendChild(degreeEl);

      var fieldEl = document.createElement("p");
      fieldEl.className = "edu-card__field";
      fieldEl.textContent = t(edu.field);
      main.appendChild(fieldEl);

      card.appendChild(main);

      var yearsEl = document.createElement("div");
      yearsEl.className = "edu-card__years font-mono";
      yearsEl.textContent = edu.start + " – " + edu.end;
      card.appendChild(yearsEl);

      eduList.appendChild(card);
    });

    eduBlock.appendChild(eduList);
    el.appendChild(eduBlock);

    /* --- CERTIFICACIONES --- */
    var certBlock = document.createElement("div");
    certBlock.className = "edu-block";

    var certHeader = document.createElement("div");
    certHeader.className = "section-header";
    var certTitle = document.createElement("h2");
    certTitle.className = "section-header__title";
    certTitle.textContent = t(CV_DATA.ui.sections.certifications);
    certHeader.appendChild(certTitle);
    var certCount = document.createElement("span");
    certCount.className = "section-header__count";
    certCount.textContent = CV_DATA.certifications.length;
    certHeader.appendChild(certCount);
    certBlock.appendChild(certHeader);

    var certGrid = document.createElement("div");
    certGrid.className = "cert-grid";

    CV_DATA.certifications.forEach(function (cert) {
      var card = document.createElement("div");
      card.className = "cert-card";

      var iconDiv = document.createElement("div");
      iconDiv.className = "cert-card__icon";
      iconDiv.appendChild(_makeIcon("award", 16));
      card.appendChild(iconDiv);

      var body = document.createElement("div");
      body.className = "cert-card__body";

      var nameEl;
      if (cert.url) {
        nameEl = document.createElement("a");
        nameEl.href = cert.url;
        nameEl.target = "_blank";
        nameEl.rel = "noopener noreferrer";
        nameEl.className = "cert-card__name cert-link";
      } else {
        nameEl = document.createElement("p");
        nameEl.className = "cert-card__name";
      }
      nameEl.textContent = t(cert.name);
      body.appendChild(nameEl);

      var metaEl = document.createElement("span");
      metaEl.className = "cert-card__meta";
      metaEl.textContent = cert.issuer + " · " + cert.year;
      body.appendChild(metaEl);

      card.appendChild(body);
      certGrid.appendChild(card);
    });

    certBlock.appendChild(certGrid);
    el.appendChild(certBlock);

    /* --- IDIOMAS --- */
    var langBlock = document.createElement("div");
    langBlock.className = "edu-block";

    var langHeader = document.createElement("div");
    langHeader.className = "section-header";
    var langTitle = document.createElement("h2");
    langTitle.className = "section-header__title";
    langTitle.textContent = t(CV_DATA.ui.sections.languages);
    langHeader.appendChild(langTitle);
    langBlock.appendChild(langHeader);

    var langChips = document.createElement("div");
    langChips.className = "lang-chips";

    CV_DATA.languages.forEach(function (lang) {
      var chip = document.createElement("span");
      chip.className = "chip";
      chip.textContent = t(lang.name) + " · " + t(lang.level);
      langChips.appendChild(chip);
    });

    langBlock.appendChild(langChips);
    el.appendChild(langBlock);

    /* --- RECONOCIMIENTOS --- */
    if (CV_DATA.honors && CV_DATA.honors.length > 0) {
      var honorsBlock = document.createElement("div");
      honorsBlock.className = "edu-block";

      var honorsHeader = document.createElement("div");
      honorsHeader.className = "section-header";
      var honorsTitle = document.createElement("h2");
      honorsTitle.className = "section-header__title";
      honorsTitle.textContent = t(CV_DATA.ui.sections.honors);
      honorsHeader.appendChild(honorsTitle);
      honorsBlock.appendChild(honorsHeader);

      var honorsList = document.createElement("div");
      honorsList.className = "honors-list";

      CV_DATA.honors.forEach(function (honor) {
        var card = document.createElement("div");
        card.className = "honor-card";

        var iconDiv = document.createElement("div");
        iconDiv.className = "honor-card__icon";
        iconDiv.appendChild(_makeIcon("star", 16));
        card.appendChild(iconDiv);

        var body = document.createElement("div");
        body.className = "honor-card__body";

        var nameEl = document.createElement("p");
        nameEl.className = "honor-card__name";
        nameEl.textContent = t(honor.name);
        body.appendChild(nameEl);

        var metaEl = document.createElement("span");
        metaEl.className = "honor-card__meta";
        metaEl.textContent = honor.issuer + " · " + honor.year;
        body.appendChild(metaEl);

        card.appendChild(body);
        honorsList.appendChild(card);
      });

      honorsBlock.appendChild(honorsList);
      el.appendChild(honorsBlock);
    }
  }

  /* -------------------------------------------------------
     INICIALIZACIÓN
     ------------------------------------------------------- */
  function renderAll() {
    renderResumen();
    renderProyectos();
    renderEducacion();
  }

  renderAll();

  /* -------------------------------------------------------
     RE-RENDER AL CAMBIAR DE IDIOMA
     ------------------------------------------------------- */
  window.addEventListener("cv:languagechange", function () {
    renderAll();
  });

})();


if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
</script>
</body>
</html>
