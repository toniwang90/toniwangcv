/* === DESIGN SYSTEM === */
/* =============================================================================
   01-design-system.css
   Design System — CV Dashboard Toni Wang
   Tokens, reset, utilidades base
   Sin <style> tags — fragmento parcial inyectado por AssemblerAgent
   ============================================================================= */

/* =============================================================================
   IMPORT DE FUENTES
   ============================================================================= */

@import url('https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

/* =============================================================================
   VARIABLES CSS — DARK MODE (default)
   ============================================================================= */

:root {
  /* --- Colores base --- */
  --color-primary:        #4f98a3;
  --color-bg:             #0d1117;
  --color-surface:        #161b22;
  --color-surface-2:      #21262d;
  --color-surface-offset: #30363d;
  --color-text:           #e6edf3;
  --color-text-muted:     #8b949e;
  --color-divider:        #21262d;

  /* --- Colores de categoría (skill matrix) --- */
  --color-blue:           #58a6ff;   /* visualization */
  --color-orange:         #f0883e;   /* cloud */
  --color-success:        #3fb950;   /* languages */
  --color-purple:         #bc8cff;   /* tools */

  /* --- Tipografía --- */
  --font-display: 'Satoshi', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* --- Escala tipográfica --- */
  --text-xs:   0.75rem;    /* 12px */
  --text-sm:   0.875rem;   /* 14px */
  --text-base: 1rem;       /* 16px */
  --text-lg:   1.125rem;   /* 18px */
  --text-xl:   1.25rem;    /* 20px */
  --text-2xl:  1.5rem;     /* 24px */
  --text-3xl:  1.875rem;   /* 30px */
  --text-4xl:  2.25rem;    /* 36px */
  --text-5xl:  3rem;       /* 48px */

  /* --- Font weights --- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-bold:    700;
  --weight-black:   900;

  /* --- Forma --- */
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-full: 9999px;

  /* --- Espaciado --- */
  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  /* --- Transiciones --- */
  --transition-fast: 120ms ease;
  --transition-base: 200ms ease;

  /* --- Sombras --- */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);

  /* --- Bordes --- */
  --border-width: 1px;
  --border: var(--border-width) solid var(--color-divider);
}

/* =============================================================================
   OVERRIDE — LIGHT MODE
   ============================================================================= */

[data-theme="light"] {
  --color-bg:             #ffffff;
  --color-surface:        #f6f8fa;
  --color-surface-2:      #eaeef2;
  --color-surface-offset: #d0d7de;
  --color-text:           #1f2328;
  --color-text-muted:     #656d76;
  --color-divider:        #d0d7de;

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.15);
}

/* =============================================================================
   RESET MÍNIMO
   ============================================================================= */

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background-color: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: 1.6;
  min-height: 100vh;
  transition: background-color var(--transition-base), color var(--transition-base);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

img,
svg {
  display: block;
  max-width: 100%;
}

button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--color-primary);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

ul,
ol {
  list-style: none;
}

/* =============================================================================
   TIPOGRAFÍA — CLASES BASE
   ============================================================================= */

.font-mono {
  font-family: var(--font-mono);
}

.font-display {
  font-family: var(--font-display);
}

.text-xs   { font-size: var(--text-xs); }
.text-sm   { font-size: var(--text-sm); }
.text-base { font-size: var(--text-base); }
.text-lg   { font-size: var(--text-lg); }
.text-xl   { font-size: var(--text-xl); }
.text-2xl  { font-size: var(--text-2xl); }
.text-3xl  { font-size: var(--text-3xl); }
.text-4xl  { font-size: var(--text-4xl); }
.text-5xl  { font-size: var(--text-5xl); }

.text-muted   { color: var(--color-text-muted); }
.text-primary { color: var(--color-primary); }

.weight-regular { font-weight: var(--weight-regular); }
.weight-medium  { font-weight: var(--weight-medium); }
.weight-bold    { font-weight: var(--weight-bold); }
.weight-black   { font-weight: var(--weight-black); }

/* =============================================================================
   SUPERFICIES
   ============================================================================= */

.surface {
  background-color: var(--color-surface);
  border: var(--border);
  border-radius: var(--radius-md);
}

.surface-2 {
  background-color: var(--color-surface-2);
  border: var(--border);
  border-radius: var(--radius-md);
}

.surface-offset {
  background-color: var(--color-surface-offset);
  border: var(--border);
  border-radius: var(--radius-md);
}

/* =============================================================================
   BADGE — chip de tecnología (JetBrains Mono, borde divider)
   ============================================================================= */

.badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--color-text-muted);
  background-color: var(--color-surface-2);
  border: var(--border);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-2);
  line-height: 1.4;
  white-space: nowrap;
  transition: color var(--transition-fast), border-color var(--transition-fast);
}

.badge:hover {
  color: var(--color-text);
  border-color: var(--color-primary);
}

/* =============================================================================
   CHIP — variante pill (radio-full)
   ============================================================================= */

.chip {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--color-text-muted);
  background-color: var(--color-surface-2);
  border: var(--border);
  border-radius: var(--radius-full);
  padding: var(--space-1) var(--space-3);
  line-height: 1.4;
  white-space: nowrap;
  transition: color var(--transition-fast), border-color var(--transition-fast);
}

.chip:hover {
  color: var(--color-text);
  border-color: var(--color-primary);
}

/* Color variants para categorías */
.chip--primary    { color: var(--color-primary);  border-color: var(--color-primary); }
.chip--blue       { color: var(--color-blue);     border-color: var(--color-blue); }
.chip--orange     { color: var(--color-orange);   border-color: var(--color-orange); }
.chip--success    { color: var(--color-success);  border-color: var(--color-success); }
.chip--purple     { color: var(--color-purple);   border-color: var(--color-purple); }

/* =============================================================================
   SKILL DOT — SVG helper classes
   ============================================================================= */

.skill-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
}

.skill-dot--filled {
  background-color: var(--color-primary);
}

.skill-dot--empty {
  background-color: transparent;
  border: var(--border-width) solid var(--color-surface-offset);
}

/* Row de skill dots */
.skill-dot-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.skill-dot-row__dots {
  display: flex;
  gap: 3px;
  align-items: center;
}

.skill-dot-row__label {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  color: var(--color-text);
  min-width: 0;
}

/* =============================================================================
   KPI CARD
   ============================================================================= */

.kpi-card {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  padding: var(--space-4) var(--space-5);
  background-color: var(--color-surface);
  border: var(--border);
  border-radius: var(--radius-md);
}

.kpi-card__value {
  font-family: var(--font-mono);
  font-size: var(--text-4xl);
  font-weight: var(--weight-bold);
  color: var(--color-text);
  line-height: 1.1;
}

.kpi-card__label {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  color: var(--color-text-muted);
}

.kpi-card__icon {
  color: var(--color-primary);
  margin-bottom: var(--space-2);
}

/* =============================================================================
   LAYOUT HELPERS
   ============================================================================= */

.container {
  width: 100%;
  max-width: 1200px;
  margin-inline: auto;
  padding-inline: var(--space-4);
}

@media (min-width: 768px) {
  .container {
    padding-inline: var(--space-6);
  }
}

@media (min-width: 1440px) {
  .container {
    padding-inline: var(--space-8);
  }
}

.stack {
  display: flex;
  flex-direction: column;
}

.stack--sm  { gap: var(--space-2); }
.stack--md  { gap: var(--space-4); }
.stack--lg  { gap: var(--space-8); }

.cluster {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
}

.cluster--sm  { gap: var(--space-2); }
.cluster--md  { gap: var(--space-3); }
.cluster--lg  { gap: var(--space-4); }

/* =============================================================================
   DIVIDER
   ============================================================================= */

.divider {
  border: none;
  border-top: var(--border);
  margin-block: var(--space-4);
}

/* =============================================================================
   FOCUS VISIBLE (accesibilidad)
   ============================================================================= */

:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}


/* === PREVIEW HELPERS === */

.preview-pending {
  margin: 1.5rem 0;
  padding: 1rem 1.25rem;
  border: 1px dashed var(--color-divider, #30363d);
  border-radius: 8px;
  background: var(--color-surface, #161b22);
  color: var(--color-text-muted, #8b949e);
  font-family: var(--font-mono, ui-monospace, monospace);
  font-size: 13px;
}
.preview-pending strong { color: var(--color-text, #e6edf3); }
.preview-fallback { max-width: 960px; margin: 2rem auto; padding: 2rem; }
.preview-fallback h1 { font-family: var(--font-display, sans-serif); }
.preview-fallback section { margin-block: 2rem; }


/* === LAYOUT === */

  /* --- Site Header --- */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--color-surface);
    border-bottom: var(--border);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .site-header__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    height: 60px;
    padding-inline: var(--space-4);
    max-width: 1200px;
    margin-inline: auto;
  }

  @media (min-width: 768px) {
    .site-header__inner {
      padding-inline: var(--space-6);
    }
  }

  @media (min-width: 1440px) {
    .site-header__inner {
      padding-inline: var(--space-8);
    }
  }

  /* --- Logo --- */
  .site-logo {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    text-decoration: none;
    flex-shrink: 0;
  }

  .site-logo:hover {
    text-decoration: none;
  }

  .site-logo__svg {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .site-logo__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .site-logo__title {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-regular);
    color: var(--color-text-muted);
    line-height: 1.2;
  }

  /* --- Primary Nav --- */
  .site-nav {
    display: none;
  }

  @media (min-width: 768px) {
    .site-nav {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
  }

  .site-nav__link {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-decoration: none;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    transition: color var(--transition-fast), background-color var(--transition-fast);
    white-space: nowrap;
  }

  .site-nav__link:hover {
    color: var(--color-text);
    background-color: var(--color-surface-2);
    text-decoration: none;
  }

  .site-nav__link.is-active {
    color: var(--color-primary);
    background-color: var(--color-surface-2);
  }

  /* --- Header Actions --- */
  .site-header__actions {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    flex-shrink: 0;
  }

  /* --- Icon buttons (theme, hamburger) --- */
  .btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color var(--transition-fast), background-color var(--transition-fast);
    flex-shrink: 0;
  }

  .btn-icon:hover {
    color: var(--color-text);
    background-color: var(--color-surface-2);
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  /* --- Language toggle pill --- */
  .btn-lang {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 44px;
    padding-inline: var(--space-3);
    border-radius: var(--radius-full);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--color-text-muted);
    background-color: var(--color-surface-2);
    border: var(--border);
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast), background-color var(--transition-fast);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .btn-lang:hover {
    color: var(--color-primary);
    border-color: var(--color-primary);
    background-color: var(--color-surface-2);
  }

  /* --- Download CV button --- */
  .btn-download {
    display: none;
    align-items: center;
    gap: var(--space-2);
    height: 44px;
    padding-inline: var(--space-4);
    border-radius: var(--radius-md);
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-bg);
    background-color: var(--color-primary);
    border: none;
    cursor: pointer;
    transition: opacity var(--transition-fast);
    white-space: nowrap;
    flex-shrink: 0;
    text-decoration: none;
  }

  .btn-download:hover {
    opacity: 0.88;
    text-decoration: none;
    color: var(--color-bg);
  }

  .btn-download svg {
    width: 16px;
    height: 16px;
    pointer-events: none;
  }

  @media (min-width: 768px) {
    .btn-download {
      display: flex;
    }
  }

  /* --- Hamburger (mobile only) --- */
  .btn-hamburger {
    display: flex;
  }

  @media (min-width: 768px) {
    .btn-hamburger {
      display: none;
    }
  }

  /* --- Mobile nav overlay --- */
  .mobile-nav {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99;
    background-color: var(--color-surface);
    flex-direction: column;
    padding: var(--space-4);
    padding-top: 72px;
    overflow-y: auto;
  }

  .mobile-nav.is-open {
    display: flex;
  }

  .mobile-nav__link {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-decoration: none;
    padding: var(--space-4) var(--space-2);
    border-bottom: var(--border);
    transition: color var(--transition-fast);
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .mobile-nav__link:hover {
    color: var(--color-primary);
    text-decoration: none;
  }

  .mobile-nav__download {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-top: var(--space-6);
    height: 52px;
    padding-inline: var(--space-5);
    border-radius: var(--radius-md);
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-medium);
    color: var(--color-bg);
    background-color: var(--color-primary);
    border: none;
    cursor: pointer;
    justify-content: center;
    text-decoration: none;
    transition: opacity var(--transition-fast);
  }

  .mobile-nav__download:hover {
    opacity: 0.88;
    color: var(--color-bg);
    text-decoration: none;
  }

  .mobile-nav__download svg {
    width: 18px;
    height: 18px;
  }

  /* --- KPI Bar --- */
  .kpi-bar {
    background-color: var(--color-bg);
    border-bottom: var(--border);
    padding-block: var(--space-4);
  }

  .kpi-bar__inner {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-3);
    max-width: 1200px;
    margin-inline: auto;
    padding-inline: var(--space-4);
  }

  @media (min-width: 768px) {
    .kpi-bar__inner {
      grid-template-columns: repeat(4, 1fr);
      padding-inline: var(--space-6);
    }
  }

  @media (min-width: 1440px) {
    .kpi-bar__inner {
      padding-inline: var(--space-8);
    }
  }

  /* --- KPI Card augment: accent bar on top --- */
  .kpi-card {
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background-color: var(--color-primary);
    opacity: 0;
    transition: opacity var(--transition-base);
  }

  .kpi-card.is-visible::before {
    opacity: 1;
  }

  /* --- Main sections scaffold --- */
  #main-content {
    max-width: 1200px;
    margin-inline: auto;
    padding-inline: var(--space-4);
    padding-block: var(--space-8);
  }

  @media (min-width: 768px) {
    #main-content {
      padding-inline: var(--space-6);
      padding-block: var(--space-10);
    }
  }

  @media (min-width: 1440px) {
    #main-content {
      padding-inline: var(--space-8);
    }
  }

  #main-content section {
    scroll-margin-top: 72px;
  }

  /* --- Light mode contrast fixes (WCAG AA) --- */
  [data-theme="light"] .kpi-card__label {
    color: var(--color-text);
  }

  [data-theme="light"] .site-nav__link {
    color: var(--color-text);
  }

  [data-theme="light"] .site-logo__title {
    color: var(--color-text);
  }


/* === TIMELINE === */

  /* ==========================================================
     TIMELINE SECTION
     ========================================================== */

  .timeline-section {
    padding-block: var(--space-10);
    border-top: var(--border);
  }

  .timeline-section__header {
    display: flex;
    align-items: baseline;
    gap: var(--space-4);
    margin-bottom: var(--space-6);
  }

  .timeline-section__title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .timeline-section__count {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
  }

  /* ==========================================================
     DESKTOP TIMELINE (SVG via D3.js)
     ========================================================== */

  .timeline-svg-wrap {
    display: none;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  @media (min-width: 768px) {
    .timeline-svg-wrap {
      display: block;
    }
  }

  .timeline-svg-wrap svg {
    display: block;
    overflow: visible;
  }

  /* Tooltip */
  .timeline-tooltip {
    position: fixed;
    z-index: 200;
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    pointer-events: none;
    opacity: 0;
    transition: opacity 100ms ease;
    max-width: 280px;
    box-shadow: var(--shadow-md);
  }

  .timeline-tooltip.is-visible {
    opacity: 1;
  }

  .timeline-tooltip__company {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin-bottom: var(--space-1);
  }

  .timeline-tooltip__role {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .timeline-tooltip__duration {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
  }

  /* ==========================================================
     MOBILE TIMELINE (card list)
     ========================================================== */

  .timeline-mobile {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  @media (min-width: 768px) {
    .timeline-mobile {
      display: none;
    }
  }

  .timeline-card {
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    cursor: pointer;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    position: relative;
    overflow: hidden;
    min-height: 44px;
  }

  .timeline-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background-color: var(--timeline-bar-color, var(--color-primary));
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  }

  .timeline-card:hover {
    border-color: var(--color-primary);
    box-shadow: var(--shadow-sm);
  }

  .timeline-card:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  /* Company header card for multi-role groups (mobile) */
  .timeline-card--company-header {
    cursor: default;
    background-color: var(--color-surface-2);
    margin-bottom: calc(var(--space-2) * -1);
    border-radius: var(--radius-md) var(--radius-md) 0 0;
  }
  .timeline-card--company-header:hover {
    border-color: var(--color-divider);
    box-shadow: none;
  }

  /* Sub-role cards sit below the company header */
  .timeline-card--sub-role {
    border-radius: 0;
    border-top: none;
  }
  .timeline-card--sub-role:last-of-type,
  li:last-child .timeline-card--sub-role {
    border-radius: 0 0 var(--radius-md) var(--radius-md);
  }

  .timeline-card__header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-3);
    margin-bottom: var(--space-2);
  }

  .timeline-card__company {
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.3;
  }

  .timeline-card__current-badge {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
    border: 1px solid var(--color-primary);
    border-radius: var(--radius-full);
    padding: 0 var(--space-2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .timeline-card__role {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .timeline-card__dates {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-bottom: var(--space-3);
  }

  .timeline-card__stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
  }

  /* ==========================================================
     DRILLDOWN PANEL
     ========================================================== */

  .drilldown-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    background-color: var(--color-overlay);
    opacity: 0;
    transition: opacity 300ms ease-out;
    pointer-events: none;
  }

  .drilldown-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  .drilldown-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 301;
    width: 100%;
    max-width: 100%;
    background-color: var(--color-surface);
    border-left: var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateX(100%);
    transition: transform 300ms ease-out;
    display: flex;
    flex-direction: column;
  }

  @media (min-width: 768px) {
    .drilldown-panel {
      width: 440px;
      max-width: 100%;
    }
  }

  .drilldown-panel.is-open {
    transform: translateX(0);
  }

  /* --- Panel header --- */
  .drilldown-panel__header {
    position: sticky;
    top: 0;
    z-index: 10;
    background-color: var(--color-surface);
    border-bottom: var(--border);
    padding: var(--space-4) var(--space-5);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-4);
  }

  .drilldown-panel__header-meta {
    min-width: 0;
    flex: 1;
  }

  .drilldown-panel__company {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
    margin-bottom: var(--space-1);
  }

  .drilldown-panel__role {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .drilldown-panel__dates {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
  }

  .drilldown-panel__close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color var(--transition-fast), background-color var(--transition-fast);
    flex-shrink: 0;
  }

  .drilldown-panel__close:hover {
    color: var(--color-text);
    background-color: var(--color-surface-2);
  }

  .drilldown-panel__close svg {
    width: 18px;
    height: 18px;
  }

  /* --- Panel body --- */
  .drilldown-panel__body {
    padding: var(--space-5);
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--space-6);
  }

  /* --- Sections within panel --- */
  .drilldown-section__label {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: var(--space-3);
  }

  /* Description */
  .drilldown-description {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text);
    line-height: 1.7;
  }

  /* Stack chips */
  .drilldown-stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  /* Impact bullets */
  .drilldown-impact {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .drilldown-impact__item {
    display: flex;
    gap: var(--space-3);
    align-items: flex-start;
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text);
    line-height: 1.6;
  }

  .drilldown-impact__bullet {
    display: inline-block;
    width: 5px;
    height: 5px;
    min-width: 5px;
    border-radius: var(--radius-full);
    background-color: var(--color-primary);
    margin-top: 8px;
    flex-shrink: 0;
  }

  /* Projects accordion */
  .drilldown-projects {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .drilldown-project {
    background-color: var(--color-surface-2);
    border: var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .drilldown-project__toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    width: 100%;
    padding: var(--space-3) var(--space-4);
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    min-height: 44px;
    transition: background-color var(--transition-fast);
  }

  .drilldown-project__toggle:hover {
    background-color: var(--color-surface-offset);
  }

  .drilldown-project__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text);
    line-height: 1.3;
  }

  .drilldown-project__chevron {
    width: 16px;
    height: 16px;
    color: var(--color-text-muted);
    transition: transform var(--transition-fast);
    flex-shrink: 0;
  }

  .drilldown-project.is-open .drilldown-project__chevron {
    transform: rotate(180deg);
  }

  .drilldown-project__body {
    display: none;
    padding: 0 var(--space-4) var(--space-4);
    border-top: var(--border);
  }

  .drilldown-project.is-open .drilldown-project__body {
    display: block;
  }

  .drilldown-project__description {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    line-height: 1.65;
    padding-top: var(--space-3);
    margin-bottom: var(--space-3);
  }

  .drilldown-project__stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
    margin-bottom: var(--space-3);
  }

  .drilldown-project__outcome {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-primary);
    line-height: 1.5;
    padding: var(--space-2) var(--space-3);
    background-color: var(--color-surface);
    border-left: 2px solid var(--color-primary);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }

  /* Overlay color tokens */
  :root {
    --color-overlay: rgba(0, 0, 0, 0.5);
  }

  [data-theme="light"] {
    --color-overlay: rgba(0, 0, 0, 0.3);
  }


/* === SKILLS === */

  /* -------------------------------------------------------
     SKILLS SECTION — scoped to .skills-section
     ------------------------------------------------------- */

  .skills-section {
    padding-block: var(--space-12);
  }

  /* Section header */
  .skills-section__header {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-6);
    border-bottom: var(--border);
    padding-bottom: var(--space-4);
  }

  .skills-section__title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .skills-section__subtitle {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  /* -------------------------------------------------------
     TABS ROW
     ------------------------------------------------------- */
  .skills-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border-bottom: var(--border);
    margin-bottom: var(--space-5);
    overflow-x: auto;
    scrollbar-width: none;
    -ms-overflow-style: none;
  }

  .skills-tabs::-webkit-scrollbar {
    display: none;
  }

  .skills-tab {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    padding: var(--space-2) var(--space-4);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: 400;
    color: var(--color-text-muted);
    white-space: nowrap;
    transition: color var(--transition-fast), border-color var(--transition-fast);
    min-height: 44px;
    position: relative;
  }

  .skills-tab:hover {
    color: var(--color-text);
  }

  .skills-tab[aria-selected="true"] {
    font-weight: var(--weight-bold);
    color: var(--color-text);
  }

  /* Active indicator color per category */
  .skills-tab[aria-selected="true"][data-cat="data_engineering"] {
    border-bottom-color: var(--color-primary);
    color: var(--color-primary);
  }
  .skills-tab[aria-selected="true"][data-cat="visualization"] {
    border-bottom-color: var(--color-blue);
    color: var(--color-blue);
  }
  .skills-tab[aria-selected="true"][data-cat="cloud"] {
    border-bottom-color: var(--color-orange);
    color: var(--color-orange);
  }
  .skills-tab[aria-selected="true"][data-cat="languages"] {
    border-bottom-color: var(--color-success);
    color: var(--color-success);
  }
  .skills-tab[aria-selected="true"][data-cat="tools"] {
    border-bottom-color: var(--color-purple);
    color: var(--color-purple);
  }

  /* Skill count badge */
  .skills-tab__badge {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    font-weight: 400;
  }

  /* -------------------------------------------------------
     PANEL
     ------------------------------------------------------- */
  .skills-panel {
    display: none;
  }

  .skills-panel--active {
    display: block;
  }

  /* 3-col on desktop, 2-col on tablet, 1-col on mobile */
  .skills-panel__grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }

  @media (min-width: 540px) {
    .skills-panel__grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 768px) {
    .skills-panel__grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  /* -------------------------------------------------------
     COMPACT SKILL ROW — ~32px height
     ------------------------------------------------------- */
  .skill-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-2);
    padding: var(--space-1) var(--space-2);
    min-height: 32px;
    border-radius: var(--radius-md);
    position: relative;
    transition: background-color var(--transition-fast);
  }

  .skill-row:hover {
    background-color: var(--color-surface-2);
  }

  .skill-row__name {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  /* -------------------------------------------------------
     SVG DOTS WRAPPER + TOOLTIP
     ------------------------------------------------------- */
  .skill-dots {
    display: flex;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }

  .skill-dots svg {
    display: block;
    overflow: visible;
  }

  /* Tooltip */
  .skill-dots__tooltip {
    position: absolute;
    bottom: calc(100% + 6px);
    right: 0;
    z-index: 30;
    background-color: var(--color-surface);
    border: 1px solid var(--color-divider);
    border-radius: var(--radius-md);
    padding: var(--space-1) var(--space-2);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity var(--transition-fast), transform var(--transition-fast);
    box-shadow: var(--shadow-md);
  }

  /* Show tooltip on hover over the full row */
  .skill-row:hover .skill-dots__tooltip,
  .skill-dots:focus-within .skill-dots__tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  /* Transition for fill animation */
  .skill-dot-circle {
    transition: fill 200ms ease-in-out;
  }


/* === CONTENT === */

  /* ============================================================
     SECCIÓN RESUMEN
     ============================================================ */

  #resumen {
    padding-block: var(--space-10) var(--space-8);
    border-bottom: var(--border);
    margin-bottom: var(--space-10);
  }

  .hero {
    display: flex;
    flex-direction: column;
    gap: var(--space-6);
  }

  @media (min-width: 768px) {
    .hero {
      flex-direction: row;
      align-items: flex-start;
      gap: var(--space-8);
    }
  }

  /* — Columna izquierda: nombre + título + ubicación — */
  .hero__identity {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  @media (min-width: 768px) {
    .hero__identity {
      min-width: 220px;
      max-width: 260px;
    }
  }

  .hero__name {
    font-family: var(--font-display);
    font-size: var(--text-3xl);
    font-weight: var(--weight-black);
    color: var(--color-text);
    line-height: 1.15;
    margin: 0;
  }

  @media (min-width: 768px) {
    .hero__name {
      font-size: var(--text-4xl);
    }
  }

  .hero__title {
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-regular);
    color: var(--color-text-muted);
    margin: 0;
  }

  .hero__location {
    display: flex;
    align-items: flex-start;
    gap: var(--space-2);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    line-height: 1.5;
    margin-top: var(--space-1);
  }

  .hero__location svg {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--color-primary);
  }

  /* — Columna central: summary — */
  .hero__summary {
    flex: 1 1 auto;
    min-width: 0;
  }

  .hero__summary p {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-regular);
    color: var(--color-text);
    line-height: 1.7;
    margin: 0;
  }

  @media (min-width: 768px) {
    .hero__summary p {
      font-size: var(--text-base);
    }
  }

  /* — Columna derecha: links + badges de idiomas — */
  .hero__aside {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  @media (min-width: 768px) {
    .hero__aside {
      min-width: 180px;
      align-items: flex-end;
    }
  }

  /* Contact links */
  .hero__contact {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  @media (min-width: 768px) {
    .hero__contact {
      align-items: flex-end;
    }
  }

  .hero__contact-link {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    text-decoration: none;
    min-height: 44px;
    padding-block: var(--space-2);
    transition: color var(--transition-fast);
  }

  .hero__contact-link:hover {
    color: var(--color-primary);
    text-decoration: none;
  }

  .hero__contact-link svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .hero__contact-link--email {
    font-family: var(--font-mono);
  }

  /* Language chips in hero */
  .hero__lang-chips {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  @media (min-width: 768px) {
    .hero__lang-chips {
      justify-content: flex-end;
    }
  }

  /* ============================================================
     SECCIÓN PROYECTOS
     ============================================================ */

  #proyectos {
    padding-block: var(--space-8);
    border-bottom: var(--border);
    margin-bottom: var(--space-10);
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-6);
  }


  .section-header__title {
    font-family: var(--font-display);
    font-size: var(--text-2xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin: 0;
  }

  .section-header__count {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  .projects-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-4);
  }

  @media (min-width: 768px) {
    .projects-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 1440px) {
    .projects-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .project-card {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-5);
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    transition: border-color var(--transition-fast);
  }

  .project-card:hover {
    border-color: var(--color-primary);
  }

  .project-card__header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .project-card__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin: 0;
    line-height: 1.4;
  }

  .project-card__company {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  [data-theme="light"] .project-card__company {
    color: var(--color-text-muted);
  }

  .project-card__description {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    line-height: 1.6;
    margin: 0;
    flex: 1;
  }

  .project-card__outcome {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text);
    line-height: 1.5;
    padding: var(--space-2) var(--space-3);
    background-color: var(--color-surface-2);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--color-primary);
  }

  .project-card__stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
    margin-top: auto;
  }

  .project-card__link {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
    text-decoration: none;
    min-height: 44px;
    padding-block: var(--space-2);
    transition: opacity var(--transition-fast);
  }

  .project-card__link:hover {
    opacity: 0.75;
    text-decoration: none;
  }

  /* Status badges */
  .badge--live {
    background-color: color-mix(in srgb, var(--color-success) 15%, transparent);
    color: var(--color-success);
    border: 1px solid color-mix(in srgb, var(--color-success) 35%, transparent);
  }

  .badge--wip {
    background-color: color-mix(in srgb, var(--color-orange) 15%, transparent);
    color: var(--color-orange);
    border: 1px solid color-mix(in srgb, var(--color-orange) 35%, transparent);
  }

  /* Show more / Show less toggle */
  .projects-toggle {
    display: block;
    margin: var(--space-5) auto 0;
    background: none;
    border: var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-5);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast);
    min-height: 44px;
  }

  .projects-toggle:hover {
    color: var(--color-text);
    border-color: var(--color-text-muted);
  }

  /* ============================================================
     SECCIÓN EDUCACIÓN (+ CERTS + IDIOMAS + RECONOCIMIENTOS)
     ============================================================ */

  #educacion {
    padding-block: var(--space-8);
    margin-bottom: var(--space-10);
  }

  /* Two-column layout for education section */
  .edu-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-8);
  }

  @media (min-width: 1024px) {
    .edu-grid {
      grid-template-columns: 1fr 1fr;
    }
  }

  .edu-col {
    display: flex;
    flex-direction: column;
    gap: var(--space-6);
  }

  /* Subsecciones dentro de #educacion */
  .edu-block {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  /* Education cards */
  .edu-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  .edu-card {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    padding: var(--space-5);
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
  }

  .edu-card__icon {
    flex-shrink: 0;
    color: var(--color-primary);
    margin-top: 2px;
  }

  .edu-card__icon svg {
    width: 16px;
    height: 16px;
  }

  .edu-card__main {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    min-width: 0;
  }

  .edu-card__institution {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin: 0;
  }

  .edu-card__degree {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    margin: 0;
  }

  .edu-card__field {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin: 0;
  }

  .edu-card__years {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    white-space: nowrap;
    flex-shrink: 0;
    margin-left: auto;
    padding-left: var(--space-3);
  }

  /* Certifications grid — single column inside edu-col */
  .cert-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-3);
  }

  .cert-card {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    padding: var(--space-4);
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    transition: border-color var(--transition-fast);
  }

  .cert-card:hover {
    border-color: var(--color-primary);
  }

  .cert-card__icon {
    flex-shrink: 0;
    color: var(--color-primary);
    margin-top: 2px;
  }

  .cert-card__icon svg {
    width: 16px;
    height: 16px;
  }

  .cert-card__body {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    min-width: 0;
  }

  .cert-card__name {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.4;
    margin: 0;
  }

  .cert-card__meta {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  /* Cert link — contraste correcto en dark y light + touch target */
  .cert-link {
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    color: var(--color-blue);
    text-decoration: none;
    transition: opacity var(--transition-fast);
  }

  .cert-link:hover {
    opacity: 0.8;
    text-decoration: underline;
  }

  [data-theme="light"] .cert-link {
    color: var(--color-text-muted);
    text-decoration: underline;
  }

  /* Languages — segmented cards */
  .lang-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: var(--space-3);
  }

  .lang-card {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
    padding: var(--space-3) var(--space-4);
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
  }

  .lang-card__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text);
    line-height: 1.3;
  }

  .lang-card__segments {
    display: flex;
    gap: 3px;
  }

  .lang-segment {
    flex: 1;
    height: 8px;
    border-radius: 3px;
    background-color: var(--color-surface-offset);
  }

  .lang-segment--filled {
    background-color: var(--color-primary);
  }

  .lang-card__level {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  /* Honors list */
  .honors-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  .honor-card {
    display: flex;
    align-items: flex-start;
    gap: var(--space-3);
    padding: var(--space-4);
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
  }

  .honor-card__icon {
    flex-shrink: 0;
    color: var(--color-orange);
    margin-top: 2px;
  }

  .honor-card__icon svg {
    width: 16px;
    height: 16px;
  }

  .honor-card__body {
    display: flex;
    flex-direction: column;
    gap: var(--space-1);
    min-width: 0;
  }

  .honor-card__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin: 0;
  }

  .honor-card__meta {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

/* =============================================================================
   06-print.css — PrintAgent
   CSS de impresión — exportar el CV como PDF limpio desde el navegador
   Solo @media print { ... } — fragmento parcial inyectado por AssemblerAgent
   Sin <style> tags
   ============================================================================= */

@media print {

  /* ===========================================================================
     @PAGE — MÁRGENES Y TAMAÑO
     =========================================================================== */

  @page {
    size: A4 portrait;
    margin: 16mm 18mm 20mm 18mm;
  }

  @page :first {
    margin-top: 12mm;
  }

  /* ===========================================================================
     FORZAR LIGHT MODE — override variables incluso con [data-theme="dark"]
     Las CSS custom properties se redefinen aquí para que toda la hoja de
     impresión use valores de alto contraste sobre blanco.
     =========================================================================== */

  :root,
  [data-theme="dark"],
  [data-theme="light"] {
    --color-bg:             white;
    --color-surface:        white;
    --color-surface-2:      #f0f0f0;
    --color-surface-offset: #d8d8d8;
    --color-text:           black;
    --color-text-muted:     #444444;
    --color-divider:        #cccccc;
    --color-primary:        #2a6a73;
    --color-blue:           #1a5fa8;
    --color-orange:         #b05c10;
    --color-success:        #1a7a28;
    --color-purple:         #6a3ab0;
    --shadow-sm:            none;
    --shadow-md:            none;
    --border:               1px solid var(--color-divider);
    --font-display:         'Satoshi', sans-serif;
    --font-mono:            'JetBrains Mono', monospace;
    --transition-fast:      0ms;
    --transition-base:      0ms;
  }

  /* ===========================================================================
     RESET GLOBAL DE IMPRESIÓN
     =========================================================================== */

  *,
  *::before,
  *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
    box-shadow: none !important;
    text-shadow: none !important;
    transition: none !important;
    animation: none !important;
  }

  html {
    font-size: 11pt;
  }

  body {
    background: white !important;
    color: black !important;
    font-family: var(--font-display) !important;
    font-size: 10pt !important;
    line-height: 1.5 !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: visible !important;
    min-height: auto !important;
    -webkit-font-smoothing: auto !important;
  }

  /* ===========================================================================
     ELEMENTOS A OCULTAR COMPLETAMENTE
     =========================================================================== */

  /* Header sticky de navegación */
  .site-header,
  .site-header__inner {
    display: none !important;
  }

  /* Navegación desktop y mobile */
  .site-nav,
  .mobile-nav {
    display: none !important;
  }

  /* Botones de acción en header */
  .btn-icon,
  .btn-lang,
  .btn-download,
  .btn-hamburger,
  .theme-toggle,
  #btn-theme,
  #btn-lang,
  #btn-download-desktop,
  #btn-hamburger {
    display: none !important;
  }

  /* KPI bar animada (no aporta en impresión) */
  .kpi-bar {
    display: none !important;
  }

  /* Tooltip del timeline D3 */
  .timeline-tooltip {
    display: none !important;
  }

  /* Tooltip de skill dots */
  .skill-dots__tooltip {
    display: none !important;
  }

  /* Drilldown panel y overlay (elemento modal) */
  .drilldown-overlay,
  .drilldown-panel {
    display: none !important;
  }

  /* SVG timeline D3 — no imprime bien (requiere viewport, escala, interactividad) */
  .timeline-svg-wrap {
    display: none !important;
  }

  /* ===========================================================================
     LAYOUT DE IMPRESIÓN — UNA COLUMNA, SIN GRIDS COMPLEJOS
     =========================================================================== */

  #main-content {
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  #main-content section {
    scroll-margin-top: 0 !important;
  }

  /* Grids multi-columna → una columna en impresión */
  .skills-grid,
  .projects-grid,
  .cert-grid {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 8pt !important;
  }

  /* Hero: una columna */
  .hero {
    flex-direction: column !important;
    gap: 8pt !important;
  }

  .hero__identity {
    min-width: auto !important;
    max-width: 100% !important;
  }

  .hero__aside {
    min-width: auto !important;
    align-items: flex-start !important;
  }

  .hero__contact {
    align-items: flex-start !important;
  }

  /* ===========================================================================
     TIMELINE EN IMPRESIÓN — MOSTRAR LISTA MOBILE, OCULTAR D3
     =========================================================================== */

  /* La lista mobile (.timeline-mobile) está hidden en desktop (display:none).
     En impresión la forzamos visible para reemplazar al SVG D3. */
  .timeline-mobile {
    display: flex !important;
    flex-direction: column !important;
    gap: 8pt !important;
  }

  /* Simplificar cards de timeline para impresión */
  .timeline-card {
    border: 1pt solid var(--color-divider) !important;
    border-radius: 4pt !important;
    padding: 8pt 10pt !important;
    cursor: default !important;
    break-inside: avoid !important;
    page-break-inside: avoid !important;
    background: white !important;
  }

  /* Eliminar el pseudo-elemento barra izquierda de color en impresión
     (depende de CSS custom property inline —timeline-bar-color— y puede
     no renderizarse correctamente en todos los motores PDF) */
  .timeline-card::before {
    display: none !important;
  }

  /* Quitar pading left extra que compensa la barra */
  .timeline-section__header {
    margin-bottom: 8pt !important;
  }

  /* ===========================================================================
     SKILL DOTS — SVG VISIBLE EN IMPRESIÓN
     =========================================================================== */

  /* Asegurar que los círculos SVG impriman con color */
  .skill-dots svg,
  .skill-dot-circle {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* Contenedor de dots: cursor default */
  .skill-dots {
    cursor: default !important;
  }

  /* Forzar visibilidad de los dots y su contenedor */
  .skill-dots,
  .skill-dots svg {
    display: inline-flex !important;
    visibility: visible !important;
    opacity: 1 !important;
  }

  /* ===========================================================================
     SUPERFICIES Y CARDS — SIMPLIFICAR BORDES
     =========================================================================== */

  .surface,
  .surface-2,
  .surface-offset,
  .skill-category,
  .timeline-card,
  .project-card,
  .edu-card,
  .cert-card,
  .honor-card {
    background: white !important;
    border: 1pt solid var(--color-divider) !important;
    box-shadow: none !important;
  }

  /* Eliminar pseudo-elementos decorativos que no imprimen bien */
  .kpi-card::before {
    display: none !important;
  }

  /* ===========================================================================
     TIPOGRAFÍA DE IMPRESIÓN
     =========================================================================== */

  /* Fallback a sistema si las web fonts no cargan */
  .font-display,
  .site-logo__name,
  .site-logo__title,
  .hero__name,
  .hero__title,
  .section-header__title,
  .timeline-section__title,
  .skills-section__title,
  .skill-category__name,
  .timeline-card__company,
  .drilldown-panel__company,
  .project-card__name,
  .edu-card__institution,
  .edu-card__degree,
  .cert-card__name,
  .honor-card__name {
    font-family: var(--font-display) !important;
  }

  .font-mono,
  .timeline-card__dates,
  .skill-row__name,
  .badge,
  .chip,
  .edu-card__years,
  .cert-card__meta,
  .honor-card__meta,
  .kpi-card__value,
  .section-header__count {
    font-family: var(--font-mono) !important;
  }

  /* Tamaños de texto en impresión */
  .hero__name {
    font-size: 20pt !important;
    line-height: 1.15 !important;
  }

  .hero__title {
    font-size: 11pt !important;
  }

  .section-header__title,
  .timeline-section__title,
  .skills-section__title {
    font-size: 13pt !important;
  }

  .skill-row__name,
  .timeline-card__company,
  .project-card__name,
  .edu-card__institution {
    font-size: 9pt !important;
  }

  .badge,
  .chip {
    font-size: 7pt !important;
    padding: 1pt 3pt !important;
  }

  /* Links visibles en impresión */
  a {
    color: black !important;
    text-decoration: none !important;
  }

  /* Mostrar URL de links de contacto y certificaciones */
  .hero__contact-link[href^="mailto:"]::after {
    content: " (" attr(href) ")";
    font-size: 7pt;
    color: var(--color-text-muted);
  }

  .cert-link[href]::after {
    display: none; /* Las URLs de certificados son largas — omitir */
  }

  /* ===========================================================================
     SALTOS DE PÁGINA
     =========================================================================== */

  /* Evitar que una sección quede partida entre páginas */
  section {
    break-inside: avoid !important;
    page-break-inside: avoid !important;
  }

  /* Educación siempre empieza en nueva página */
  #educacion {
    break-before: always !important;
    page-break-before: always !important;
  }

  /* Evitar que cards queden partidas */
  .timeline-card,
  .skill-category,
  .project-card,
  .edu-card,
  .cert-card,
  .honor-card,
  .edu-block {
    break-inside: avoid !important;
    page-break-inside: avoid !important;
  }

  /* Evitar heading huérfano al final de página */
  .section-header,
  .timeline-section__header,
  .skills-section__header {
    break-after: avoid !important;
    page-break-after: avoid !important;
  }

  /* ===========================================================================
     CONTENIDO TRADUCIDO — NO OCULTAR
     Los elementos con data-i18n ya tienen su textContent renderizado
     por applyStaticLabels() antes de abrir el diálogo de impresión.
     El CSS no fuerza ningún idioma — muestra el contenido activo.
     =========================================================================== */

  [data-i18n],
  [data-i18n-aria] {
    visibility: visible !important;
    display: revert !important;
  }

  /* ===========================================================================
     OVERFLOW Y SCROLL — ELIMINAR
     =========================================================================== */

  body,
  #main-content,
  .timeline-section,
  .skills-section,
  #resumen,
  #proyectos,
  #educacion {
    overflow: visible !important;
    max-width: 100% !important;
  }

  /* Scrollable wrapper del SVG — ya oculto, pero por si acaso */
  .timeline-svg-wrap {
    overflow: visible !important;
  }

  /* ===========================================================================
     SCROLL-SPY ACTIVE STATE — LIMPIAR
     =========================================================================== */

  .site-nav__link.is-active {
    color: black !important;
    background-color: transparent !important;
  }

}
/* fin @media print */

  </style>

 *

 *   t(CV_DATA.profile.summary)

  if (value == null) return "";
  if (typeof value === "object" && !Array.isArray(value) && (value.es !== undefined || value.en !== undefined)) {

  /* ----------------------------------------------------------

  function renderD3Timeline() {

    var ROW_HEIGHT = 40;

    var LABEL_FONT_SIZE = 12;

    var rowGroups = [];
    EXPERIENCE.forEach(function (exp) {
      var last = rowGroups[rowGroups.length - 1];
      if (last && last.company === exp.company) {
        last.entries.push(exp);
      } else {
        rowGroups.push({ company: exp.company, entries: [exp] });
      }
    });
    rowGroups.forEach(function (group, gi) {
      group.color = COMPANY_COLORS[gi % COMPANY_COLORS.length];
    });

    rowGroups.forEach(function (group) {
      group.entries.forEach(function (exp, ei) {
        flatRows.push({
          exp: exp,
          group: group,
          isFirst: ei === 0,
          isLast: ei === group.entries.length - 1,
          multiRole: group.entries.length > 1
        });

    var HEADER_HEIGHT = 22;
    var yOffsets = [];

      if (row.isFirst && ri > 0) cumY += GROUP_GAP;
      if (row.isFirst && row.multiRole) cumY += HEADER_HEIGHT;
      yOffsets.push(cumY);

    var domainStart = d3.min(allStarts);
    var domainEnd = today();
    var domainEndPadded = new Date(domainEnd.getFullYear(), domainEnd.getMonth() + 2, 1);

      .domain([domainStart, domainEndPadded])
      .range([0, innerWidth]);

    var svg = d3.select(wrap)
      .append("svg")
      .attr("width", totalWidth)
      .attr("height", totalHeight)

          .attr("font-family", "var(--font-mono)")
          .attr("font-size", LABEL_FONT_SIZE + "px");
      });

    // Horizontal grid lines
    flatRows.forEach(function (row, ri) {
      var y = yOffsets[ri] + ROW_HEIGHT / 2;
      g.append("line")
        .attr("x1", 0)
        .attr("x2", innerWidth)
        .attr("y1", y)
        .attr("y2", y)
        .attr("stroke", "var(--color-divider)")
        .attr("stroke-width", 1)
        .attr("stroke-dasharray", "2,4");

      .attr("x1", todayX)
      .attr("x2", todayX)

      .attr("stroke", "var(--color-primary)")
      .attr("stroke-width", 1.5)
      .attr("stroke-dasharray", "4,3")
      .attr("opacity", 0.7);

    g.append("text")
      .attr("x", todayX + 4)
      .attr("y", -MARGIN.top + 14)
      .attr("fill", "var(--color-primary)")
      .attr("font-family", "var(--font-mono)")
      .attr("font-size", "12px")
      .text(todayLabel);

    // Tooltip
    var tooltip = document.getElementById("timeline-tooltip");
    var ttCompany = document.getElementById("tt-company");
    var ttRole = document.getElementById("tt-role");
    var ttDuration = document.getElementById("tt-duration");

    // Bars + labels (grouped by company)
    flatRows.forEach(function (row, ri) {
      var exp = row.exp;
      var group = row.group;
      var color = group.color;
      var barY = yOffsets[ri];

      var startX = xScale(parseYearMonth(exp.start));
      var endDate = exp.current ? today() : parseYearMonth(exp.end);
      var endX = xScale(endDate);
      var barWidth = Math.max(endX - startX, 4);

      /* ---- Company header label + bracket (drawn once, above first bar) ---- */
      if (row.isFirst && row.multiRole) {
        var lastGroupRowIdx = ri + group.entries.length - 1;
        var bracketTop = yOffsets[ri];
        var bracketBot = yOffsets[lastGroupRowIdx] + ROW_HEIGHT;

        // Company name above the first bar
        var companyFull = exp.company;
        var companyText = companyFull.length > 28 ? companyFull.slice(0, 26) + "…" : companyFull;
        var companyHeader = g.append("text")
          .attr("x", -8)
          .attr("y", barY - HEADER_HEIGHT / 2 + 4)
          .attr("text-anchor", "end")
          .attr("fill", "var(--color-text)")
          .attr("font-family", "var(--font-display)")
          .attr("font-weight", "600")
          .attr("font-size", LABEL_FONT_SIZE + "px")
          .text(companyText);
        companyHeader.append("title").text(companyFull);

        // Vertical bracket spanning all role bars
        g.append("rect")
          .attr("x", -MARGIN.left + 6)
          .attr("y", bracketTop)
          .attr("width", 3)
          .attr("height", bracketBot - bracketTop)
          .attr("rx", 1.5)

          .attr("opacity", 0.7);
      }

      /* ---- Role label + hit area ---- */
      var labelGroup = g.append("g")
        .attr("class", "timeline-label-group")

      if (row.multiRole) {
        // Role + optional client on second line
        var roleFull = t(exp.role);
        var roleText = roleFull.length > 32 ? roleFull.slice(0, 30) + "…" : roleFull;
        var hasClient = exp.client;
        var roleY = hasClient ? barY + ROW_HEIGHT / 2 - 5 : barY + ROW_HEIGHT / 2 + 4;
        labelGroup.append("text")

        companyEl = labelGroup.append("text")
          .attr("x", -8)
          .attr("y", barY + ROW_HEIGHT / 2 - 5)
          .attr("text-anchor", "end")
          .attr("fill", "var(--color-text)")

          .append("title").text(roleFull);

        .attr("y", barY - (44 - ROW_HEIGHT) / 2)
        .attr("width", MARGIN.left - 12)

        .attr("class", "timeline-bar-group")
        .style("cursor", "pointer");

        .attr("x", startX)

        tooltip.classList.add("is-visible");
        tooltip.setAttribute("aria-hidden", "false");

      });

        tooltip.setAttribute("aria-hidden", "true");
      });
      barGroup.on("click", function () {
        tooltip.classList.remove("is-visible");
        openDrilldown(exp.id);
      });

        .text(exp.company + " — " + t(exp.role) + " · " + calcDuration(exp));
    });
  }

  function _positionTooltip(clientX, clientY) {
    var tooltip = document.getElementById("timeline-tooltip");
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var tw = tooltip.offsetWidth || 240;
    var th = tooltip.offsetHeight || 80;
    var offset = 14;

    var left = clientX + offset;
    var top = clientY + offset;

    if (left + tw > vw - 8) left = clientX - tw - offset;
    if (top + th > vh - 8) top = clientY - th - offset;

    tooltip.style.left = left + "px";
    tooltip.style.top = top + "px";
  }

  ---------------------------------------------------------- */
  function renderAll() {

    if (window.innerWidth >= 768 && typeof d3 !== "undefined") {
      renderD3Timeline();

    var hash = window.location.hash.replace("#", "");
    if (hash && EXPERIENCE.find(function (e) { return e.id === hash; })) {
      openDrilldown(hash);
    }
  }

  /* ----------------------------------------------------------
     LANGUAGE CHANGE LISTENER
  ---------------------------------------------------------- */
  window.addEventListener("cv:languagechange", function () {
    renderHeader();
    renderMobileList();
    if (window.innerWidth >= 768 && typeof d3 !== "undefined") {
      renderD3Timeline();
    }
    // Re-render drilldown content if one is open
    if (_openExpId) {
      var exp = EXPERIENCE.find(function (e) { return e.id === _openExpId; });
      if (exp) renderDrilldownContent(exp);
    }
  });

  /* ----------------------------------------------------------
     RESIZE HANDLER — re-render D3 on viewport width change
  ---------------------------------------------------------- */
  var _resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function () {
      if (window.innerWidth >= 768 && typeof d3 !== "undefined") {
        renderD3Timeline();
      }
    }, 200);
  });

  /* ----------------------------------------------------------
     INIT
  ---------------------------------------------------------- */
  // D3 may not be loaded yet — wait for it
  function _waitForD3AndRender() {
    if (typeof d3 !== "undefined") {
      renderAll();
    } else {
      setTimeout(_waitForD3AndRender, 50);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", _waitForD3AndRender);
  } else {
    _waitForD3AndRender();
  }

})();

    for (var i = 0; i < DOT_TOTAL; i++) {
      var cx = DOT_R + i * DOT_STEP;
      var cy = DOT_R;

      var circle = document.createElementNS(ns, "circle");
      circle.setAttribute("cx", cx);
      circle.setAttribute("cy", cy);
      circle.setAttribute("r", DOT_R);
      circle.setAttribute("rx", "var(--radius-full)");
      circle.setAttribute("class", "skill-dot-circle");
      circle.setAttribute("fill", "var(--color-surface-2)");
      circle.setAttribute("stroke", "var(--color-surface-offset)");
      circle.setAttribute("stroke-width", "1");

      svg.appendChild(circle);
      circles.push(circle);

      // Tab button
      var tab = document.createElement("button");
      tab.className = "skills-tab";
      tab.setAttribute("role", "tab");

      tab.setAttribute("aria-controls", "skills-panel-" + cat);
      tab.setAttribute("aria-selected", "false");

      var labelSpan = document.createElement("span");
      labelSpan.setAttribute("data-tab-label", cat);
      labelSpan.textContent = label;

      var badgeSpan = document.createElement("span");
      badgeSpan.className = "skills-tab__badge";
      badgeSpan.textContent = "(" + count + ")";

      tab.appendChild(labelSpan);
      tab.appendChild(badgeSpan);
      tabsEl.appendChild(tab);

      tab.addEventListener("click", function () {

      });

        var tabs = Array.from(tabsEl.querySelectorAll(".skills-tab"));
        var idx  = tabs.indexOf(tab);
        if (e.key === "ArrowRight" || e.key === "ArrowDown") {
          e.preventDefault();
          var next = tabs[(idx + 1) % tabs.length];
          next.focus();
          _selectTab(next.getAttribute("data-cat"));
        } else if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
          e.preventDefault();
          var prev = tabs[(idx - 1 + tabs.length) % tabs.length];
          prev.focus();
          _selectTab(prev.getAttribute("data-cat"));
        }
      });
    });

    _selectTab(DEFAULT_TAB, /* skipAnim */ true);
  }

  /* -------------------------------------------------------
     SELECT TAB
     skipAnim = true → show panel but don't fire animation
     (used on init; observer triggers animation separately)
     ------------------------------------------------------- */
  function _selectTab(cat, skipAnim) {
    var tabsEl = document.getElementById("skills-tabs");
    if (!tabsEl) return;

    // Deactivate all
    tabsEl.querySelectorAll(".skills-tab").forEach(function (t) {
      t.setAttribute("aria-selected", "false");
      t.setAttribute("tabindex", "-1");
    });
    document.querySelectorAll(".skills-panel").forEach(function (p) {
      p.classList.remove("skills-panel--active");
    });

    // Activate selected
    var tab   = document.getElementById("skills-tab-" + cat);
    var panel = document.getElementById("skills-panel-" + cat);
    if (!tab || !panel) return;

    tab.setAttribute("aria-selected", "true");
    tab.setAttribute("tabindex", "0");
    panel.classList.add("skills-panel--active");
    _activeTab = cat;

    if (!skipAnim && _observerFired) {
      _animateCategory(cat);
    }
  }

  /* -------------------------------------------------------
     INTERSECTION OBSERVER
     Animates the default (active) tab on first viewport entry.
     Does NOT re-animate on re-entry.
     ------------------------------------------------------- */
  function _setupObserver() {
    var section = document.getElementById("skills");
    if (!section) return;

    if (!("IntersectionObserver" in window)) {
      // Fallback: animate active tab immediately
      _observerFired = true;
      if (_activeTab) _animateCategory(_activeTab);
      return;
    }

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {

          _observerFired = true;
          if (_activeTab) _animateCategory(_activeTab);
          observer.disconnect();
        }
      });
    }, { threshold: 0.3 });

    observer.observe(section);
  }

  /* -------------------------------------------------------
     i18n REFRESH — tab labels + tooltips
     Dots are NOT re-rendered on language change.
     ------------------------------------------------------- */
  function _refreshLabels() {
    // Tab labels
    document.querySelectorAll("[data-tab-label]").forEach(function (el) {
      var cat = el.getAttribute("data-tab-label");
      var label = CV_DATA.ui.skills.categories[cat];
      if (label) el.textContent = t(label);
    });

    // Tooltip strings and aria-labels
    document.querySelectorAll(".skill-dots[data-skill-name]").forEach(function (wrap) {
      var years = parseInt(wrap.getAttribute("data-years"), 10);
      var level = parseInt(wrap.getAttribute("data-level"), 10);
      var name  = wrap.getAttribute("data-skill-name");
      var tt    = _tooltipText(years, level);

      wrap.setAttribute("aria-label", name + " — " + tt);
      var tooltipEl = wrap.querySelector(".skill-dots__tooltip");
      if (tooltipEl) tooltipEl.textContent = tt;
    });
  }

  window.addEventListener("cv:languagechange", _refreshLabels);

  /* -------------------------------------------------------
     INIT
     ------------------------------------------------------- */
  function _init() {
    _render();
    _setupObserver();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", _init);
  } else {
    _init();
  }

    langHeader.className = "section-header";
    var langTitle = document.createElement("h2");
    langTitle.className = "section-header__title";
    langTitle.textContent = t(CV_DATA.ui.sections.languages);
    langHeader.appendChild(langTitle);
    langBlock.appendChild(langHeader);

    var langGrid = document.createElement("div");
    langGrid.className = "lang-grid";

    var LANG_LEVEL_LABELS = {
      es: ["Elemental", "Básico", "Intermedio", "Profesional", "Nativo"],
      en: ["Elementary", "Basic", "Intermediate", "Professional", "Native"]
    };

    function _langScore(levelText) {
      var text = (levelText || "").toLowerCase();
      if (text.indexOf("nativo") !== -1 || text.indexOf("native") !== -1) return 5;
      if (text.indexOf("profesional") !== -1 || text.indexOf("professional") !== -1 || text.indexOf("working") !== -1 || text.indexOf("avanzado") !== -1 || text.indexOf("advanced") !== -1) return 4;
      if (text.indexOf("intermedio") !== -1 || text.indexOf("intermediate") !== -1) return 3;
      if (text.indexOf("básico") !== -1 || text.indexOf("basic") !== -1) return 2;
      return 1;
    }

    CV_DATA.languages.forEach(function (lang) {
      var score = _langScore(t(lang.level));
      var lang2 = window.__cvLang || CV_DATA.meta.default_language;
      var levelLabel = (LANG_LEVEL_LABELS[lang2] || LANG_LEVEL_LABELS.es)[score - 1];

      var card = document.createElement("div");
      card.className = "lang-card";

      var nameEl = document.createElement("span");
      nameEl.className = "lang-card__name";
      nameEl.textContent = t(lang.name);
      card.appendChild(nameEl);

      var segsEl = document.createElement("div");
      segsEl.className = "lang-card__segments";
      for (var i = 0; i < 5; i++) {
        var seg = document.createElement("span");
        seg.className = "lang-segment" + (i < score ? " lang-segment--filled" : "");
        segsEl.appendChild(seg);
      }
      card.appendChild(segsEl);

      var levelEl = document.createElement("span");
      levelEl.className = "lang-card__level";
      levelEl.textContent = levelLabel;
      card.appendChild(levelEl);

      langGrid.appendChild(card);
    });

    langBlock.appendChild(langGrid);

    /* --- RECONOCIMIENTOS --- */
    var honorsBlock = null;
    if (CV_DATA.honors && CV_DATA.honors.length > 0) {
      honorsBlock = document.createElement("div");
      honorsBlock.className = "edu-block";

      var honorsHeader = document.createElement("div");
      honorsHeader.className = "section-header";
      var honorsTitle = document.createElement("h2");
      honorsTitle.className = "section-header__title";
      honorsTitle.textContent = t(CV_DATA.ui.sections.honors);
      honorsHeader.appendChild(honorsTitle);
      honorsBlock.appendChild(honorsHeader);

      var honorsList = document.createElement("div");
      honorsList.className = "honors-list";

      CV_DATA.honors.forEach(function (honor) {
        var card = document.createElement("div");
        card.className = "honor-card";

        var iconDiv = document.createElement("div");
        iconDiv.className = "honor-card__icon";
        iconDiv.appendChild(_makeIcon("award", 16));
        card.appendChild(iconDiv);

        var body = document.createElement("div");
        body.className = "honor-card__body";

        var nameEl = document.createElement("p");
        nameEl.className = "honor-card__name";
        nameEl.textContent = t(honor.name);
        body.appendChild(nameEl);

        var metaEl = document.createElement("span");
        metaEl.className = "honor-card__meta";
        metaEl.textContent = honor.issuer + " · " + honor.year;
        body.appendChild(metaEl);

        card.appendChild(body);
        honorsList.appendChild(card);
      });

      honorsBlock.appendChild(honorsList);
    }

    /* Two-column layout: left = education + languages, right = certifications + honors */
    var eduGrid = document.createElement("div");
    eduGrid.className = "edu-grid";

    var leftCol = document.createElement("div");
    leftCol.className = "edu-col";
    leftCol.appendChild(eduBlock);
    leftCol.appendChild(langBlock);

    var rightCol = document.createElement("div");
    rightCol.className = "edu-col";
    rightCol.appendChild(certBlock);
    if (honorsBlock) rightCol.appendChild(honorsBlock);

    eduGrid.appendChild(leftCol);
    eduGrid.appendChild(rightCol);
    el.appendChild(eduGrid);
  }

  /* -------------------------------------------------------
     INICIALIZACIÓN
     ------------------------------------------------------- */
  function renderAll() {
    renderResumen();
    renderProyectos();
    renderEducacion();
  }

  renderAll();

  /* -------------------------------------------------------
     RE-RENDER AL CAMBIAR DE IDIOMA
     ------------------------------------------------------- */
  window.addEventListener("cv:languagechange", function () {
    renderAll();
  });

})();

} catch (err) { console.warn('[preview] CONTENT script failed:', err); }

if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
</script>
</body>
