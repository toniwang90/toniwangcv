/* === DESIGN SYSTEM === */
/* =============================================================================
   01-design-system.css
   Design System — CV Dashboard Toni Wang
   Tokens, reset, utilidades base
   Sin <style> tags — fragmento parcial inyectado por AssemblerAgent
   ============================================================================= */

/* =============================================================================
   IMPORT DE FUENTES
   ============================================================================= */

@import url('https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&display=swap');
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

/* =============================================================================
   VARIABLES CSS — DARK MODE (default)
   ============================================================================= */

:root {
  /* --- Colores base --- */
  --color-primary:        #4f98a3;
  --color-bg:             #0d1117;
  --color-surface:        #161b22;
  --color-surface-2:      #21262d;
  --color-surface-offset: #30363d;
  --color-text:           #e6edf3;
  --color-text-muted:     #8b949e;
  --color-divider:        #21262d;

  /* --- Colores de categoría (skill matrix) --- */
  --color-blue:           #58a6ff;   /* visualization */
  --color-orange:         #f0883e;   /* cloud */
  --color-success:        #3fb950;   /* languages */
  --color-purple:         #bc8cff;   /* tools */

  /* --- Tipografía --- */
  --font-display: 'Satoshi', sans-serif;
  --font-mono:    'JetBrains Mono', monospace;

  /* --- Escala tipográfica --- */
  --text-xs:   0.75rem;    /* 12px */
  --text-sm:   0.875rem;   /* 14px */
  --text-base: 1rem;       /* 16px */
  --text-lg:   1.125rem;   /* 18px */
  --text-xl:   1.25rem;    /* 20px */
  --text-2xl:  1.5rem;     /* 24px */
  --text-3xl:  1.875rem;   /* 30px */
  --text-4xl:  2.25rem;    /* 36px */
  --text-5xl:  3rem;       /* 48px */

  /* --- Font weights --- */
  --weight-regular: 400;
  --weight-medium:  500;
  --weight-bold:    700;
  --weight-black:   900;

  /* --- Forma --- */
  --radius-sm:   4px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-full: 9999px;

  /* --- Espaciado --- */
  --space-1:  0.25rem;
  --space-2:  0.5rem;
  --space-3:  0.75rem;
  --space-4:  1rem;
  --space-5:  1.25rem;
  --space-6:  1.5rem;
  --space-8:  2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;

  /* --- Transiciones --- */
  --transition-fast: 120ms ease;
  --transition-base: 200ms ease;

  /* --- Sombras --- */
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.5);

  /* --- Bordes --- */
  --border-width: 1px;
  --border: var(--border-width) solid var(--color-divider);
}

/* =============================================================================
   OVERRIDE — LIGHT MODE
   ============================================================================= */

[data-theme="light"] {
  --color-bg:             #ffffff;
  --color-surface:        #f6f8fa;
  --color-surface-2:      #eaeef2;
  --color-surface-offset: #d0d7de;
  --color-text:           #1f2328;
  --color-text-muted:     #656d76;
  --color-divider:        #d0d7de;

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.12);
  --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.15);
}

/* =============================================================================
   RESET MÍNIMO
   ============================================================================= */

*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-text-size-adjust: 100%;
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background-color: var(--color-bg);
  color: var(--color-text);
  font-family: var(--font-display);
  font-size: var(--text-base);
  font-weight: var(--weight-regular);
  line-height: 1.6;
  min-height: 100vh;
  transition: background-color var(--transition-base), color var(--transition-base);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

img,
svg {
  display: block;
  max-width: 100%;
}

button {
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

a {
  color: var(--color-primary);
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}

ul,
ol {
  list-style: none;
}

/* =============================================================================
   TIPOGRAFÍA — CLASES BASE
   ============================================================================= */

.font-mono {
  font-family: var(--font-mono);
}

.font-display {
  font-family: var(--font-display);
}

.text-xs   { font-size: var(--text-xs); }
.text-sm   { font-size: var(--text-sm); }
.text-base { font-size: var(--text-base); }
.text-lg   { font-size: var(--text-lg); }
.text-xl   { font-size: var(--text-xl); }
.text-2xl  { font-size: var(--text-2xl); }
.text-3xl  { font-size: var(--text-3xl); }
.text-4xl  { font-size: var(--text-4xl); }
.text-5xl  { font-size: var(--text-5xl); }

.text-muted   { color: var(--color-text-muted); }
.text-primary { color: var(--color-primary); }

.weight-regular { font-weight: var(--weight-regular); }
.weight-medium  { font-weight: var(--weight-medium); }
.weight-bold    { font-weight: var(--weight-bold); }
.weight-black   { font-weight: var(--weight-black); }

/* =============================================================================
   SUPERFICIES
   ============================================================================= */

.surface {
  background-color: var(--color-surface);
  border: var(--border);
  border-radius: var(--radius-md);
}

.surface-2 {
  background-color: var(--color-surface-2);
  border: var(--border);
  border-radius: var(--radius-md);
}

.surface-offset {
  background-color: var(--color-surface-offset);
  border: var(--border);
  border-radius: var(--radius-md);
}

/* =============================================================================
   BADGE — chip de tecnología (JetBrains Mono, borde divider)
   ============================================================================= */

.badge {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--color-text-muted);
  background-color: var(--color-surface-2);
  border: var(--border);
  border-radius: var(--radius-sm);
  padding: var(--space-1) var(--space-2);
  line-height: 1.4;
  white-space: nowrap;
  transition: color var(--transition-fast), border-color var(--transition-fast);
}

.badge:hover {
  color: var(--color-text);
  border-color: var(--color-primary);
}

/* =============================================================================
   CHIP — variante pill (radio-full)
   ============================================================================= */

.chip {
  display: inline-flex;
  align-items: center;
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  font-weight: var(--weight-medium);
  color: var(--color-text-muted);
  background-color: var(--color-surface-2);
  border: var(--border);
  border-radius: var(--radius-full);
  padding: var(--space-1) var(--space-3);
  line-height: 1.4;
  white-space: nowrap;
  transition: color var(--transition-fast), border-color var(--transition-fast);
}

.chip:hover {
  color: var(--color-text);
  border-color: var(--color-primary);
}

/* Color variants para categorías */
.chip--primary    { color: var(--color-primary);  border-color: var(--color-primary); }
.chip--blue       { color: var(--color-blue);     border-color: var(--color-blue); }
.chip--orange     { color: var(--color-orange);   border-color: var(--color-orange); }
.chip--success    { color: var(--color-success);  border-color: var(--color-success); }
.chip--purple     { color: var(--color-purple);   border-color: var(--color-purple); }

/* =============================================================================
   SKILL DOT — SVG helper classes
   ============================================================================= */

.skill-dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: var(--radius-full);
  flex-shrink: 0;
}

.skill-dot--filled {
  background-color: var(--color-primary);
}

.skill-dot--empty {
  background-color: transparent;
  border: var(--border-width) solid var(--color-surface-offset);
}

/* Row de skill dots */
.skill-dot-row {
  display: flex;
  align-items: center;
  gap: var(--space-2);
}

.skill-dot-row__dots {
  display: flex;
  gap: 3px;
  align-items: center;
}

.skill-dot-row__label {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  color: var(--color-text);
  min-width: 0;
}

/* =============================================================================
   KPI CARD
   ============================================================================= */

.kpi-card {
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  padding: var(--space-4) var(--space-5);
  background-color: var(--color-surface);
  border: var(--border);
  border-radius: var(--radius-md);
}

.kpi-card__value {
  font-family: var(--font-mono);
  font-size: var(--text-4xl);
  font-weight: var(--weight-bold);
  color: var(--color-text);
  line-height: 1.1;
}

.kpi-card__label {
  font-family: var(--font-display);
  font-size: var(--text-sm);
  font-weight: var(--weight-medium);
  color: var(--color-text-muted);
}

.kpi-card__icon {
  color: var(--color-primary);
  margin-bottom: var(--space-2);
}

/* =============================================================================
   LAYOUT HELPERS
   ============================================================================= */

.container {
  width: 100%;
  max-width: 1200px;
  margin-inline: auto;
  padding-inline: var(--space-4);
}

@media (min-width: 768px) {
  .container {
    padding-inline: var(--space-6);
  }
}

@media (min-width: 1440px) {
  .container {
    padding-inline: var(--space-8);
  }
}

.stack {
  display: flex;
  flex-direction: column;
}

.stack--sm  { gap: var(--space-2); }
.stack--md  { gap: var(--space-4); }
.stack--lg  { gap: var(--space-8); }

.cluster {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
}

.cluster--sm  { gap: var(--space-2); }
.cluster--md  { gap: var(--space-3); }
.cluster--lg  { gap: var(--space-4); }

/* =============================================================================
   DIVIDER
   ============================================================================= */

.divider {
  border: none;
  border-top: var(--border);
  margin-block: var(--space-4);
}

/* =============================================================================
   FOCUS VISIBLE (accesibilidad)
   ============================================================================= */

:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}


/* === PREVIEW HELPERS === */

.preview-pending {
  margin: 1.5rem 0;
  padding: 1rem 1.25rem;
  border: 1px dashed var(--color-divider, #30363d);
  border-radius: 8px;
  background: var(--color-surface, #161b22);
  color: var(--color-text-muted, #8b949e);
  font-family: var(--font-mono, ui-monospace, monospace);
  font-size: 13px;
}
.preview-pending strong { color: var(--color-text, #e6edf3); }
.preview-fallback { max-width: 960px; margin: 2rem auto; padding: 2rem; }
.preview-fallback h1 { font-family: var(--font-display, sans-serif); }
.preview-fallback section { margin-block: 2rem; }


/* === LAYOUT === */

  /* --- Site Header --- */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background-color: var(--color-surface);
    border-bottom: var(--border);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .site-header__inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-4);
    height: 60px;
    padding-inline: var(--space-4);
    max-width: 1200px;
    margin-inline: auto;
  }

  @media (min-width: 768px) {
    .site-header__inner {
      padding-inline: var(--space-6);
    }
  }

  @media (min-width: 1440px) {
    .site-header__inner {
      padding-inline: var(--space-8);
    }
  }

  /* --- Logo --- */
  .site-logo {
    display: flex;
    align-items: center;
    gap: var(--space-3);
    text-decoration: none;
    flex-shrink: 0;
  }

  .site-logo:hover {
    text-decoration: none;
  }

  .site-logo__svg {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }

  .site-logo__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .site-logo__title {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-regular);
    color: var(--color-text-muted);
    line-height: 1.2;
  }

  /* --- Primary Nav --- */
  .site-nav {
    display: none;
  }

  @media (min-width: 768px) {
    .site-nav {
      display: flex;
      align-items: center;
      gap: var(--space-1);
    }
  }

  .site-nav__link {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-decoration: none;
    padding: var(--space-2) var(--space-3);
    border-radius: var(--radius-md);
    transition: color var(--transition-fast), background-color var(--transition-fast);
    white-space: nowrap;
  }

  .site-nav__link:hover {
    color: var(--color-text);
    background-color: var(--color-surface-2);
    text-decoration: none;
  }

  .site-nav__link.is-active {
    color: var(--color-primary);
    background-color: var(--color-surface-2);
  }

  /* --- Header Actions --- */
  .site-header__actions {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    flex-shrink: 0;
  }

  /* --- Icon buttons (theme, hamburger) --- */
  .btn-icon {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color var(--transition-fast), background-color var(--transition-fast);
    flex-shrink: 0;
  }

  .btn-icon:hover {
    color: var(--color-text);
    background-color: var(--color-surface-2);
  }

  .btn-icon svg {
    width: 18px;
    height: 18px;
    pointer-events: none;
  }

  /* --- Language toggle pill --- */
  .btn-lang {
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 44px;
    height: 44px;
    padding-inline: var(--space-3);
    border-radius: var(--radius-full);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-bold);
    color: var(--color-text-muted);
    background-color: var(--color-surface-2);
    border: var(--border);
    cursor: pointer;
    transition: color var(--transition-fast), border-color var(--transition-fast), background-color var(--transition-fast);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .btn-lang:hover {
    color: var(--color-primary);
    border-color: var(--color-primary);
    background-color: var(--color-surface-2);
  }

  /* --- Download CV button --- */
  .btn-download {
    display: none;
    align-items: center;
    gap: var(--space-2);
    height: 44px;
    padding-inline: var(--space-4);
    border-radius: var(--radius-md);
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-bg);
    background-color: var(--color-primary);
    border: none;
    cursor: pointer;
    transition: opacity var(--transition-fast);
    white-space: nowrap;
    flex-shrink: 0;
    text-decoration: none;
  }

  .btn-download:hover {
    opacity: 0.88;
    text-decoration: none;
    color: var(--color-bg);
  }

  .btn-download svg {
    width: 16px;
    height: 16px;
    pointer-events: none;
  }

  @media (min-width: 768px) {
    .btn-download {
      display: flex;
    }
  }

  /* --- Hamburger (mobile only) --- */
  .btn-hamburger {
    display: flex;
  }

  @media (min-width: 768px) {
    .btn-hamburger {
      display: none;
    }
  }

  /* --- Mobile nav overlay --- */
  .mobile-nav {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 99;
    background-color: var(--color-surface);
    flex-direction: column;
    padding: var(--space-4);
    padding-top: 72px;
    overflow-y: auto;
  }

  .mobile-nav.is-open {
    display: flex;
  }

  .mobile-nav__link {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-decoration: none;
    padding: var(--space-4) var(--space-2);
    border-bottom: var(--border);
    transition: color var(--transition-fast);
    min-height: 44px;
    display: flex;
    align-items: center;
  }

  .mobile-nav__link:hover {
    color: var(--color-primary);
    text-decoration: none;
  }

  .mobile-nav__download {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    margin-top: var(--space-6);
    height: 52px;
    padding-inline: var(--space-5);
    border-radius: var(--radius-md);
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-medium);
    color: var(--color-bg);
    background-color: var(--color-primary);
    border: none;
    cursor: pointer;
    justify-content: center;
    text-decoration: none;
    transition: opacity var(--transition-fast);
  }

  .mobile-nav__download:hover {
    opacity: 0.88;
    color: var(--color-bg);
    text-decoration: none;
  }

  .mobile-nav__download svg {
    width: 18px;
    height: 18px;
  }

  /* --- KPI Bar --- */
  .kpi-bar {
    background-color: var(--color-bg);
    border-bottom: var(--border);
    padding-block: var(--space-4);
  }

  .kpi-bar__inner {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-3);
    max-width: 1200px;
    margin-inline: auto;
    padding-inline: var(--space-4);
  }

  @media (min-width: 768px) {
    .kpi-bar__inner {
      grid-template-columns: repeat(4, 1fr);
      padding-inline: var(--space-6);
    }
  }

  @media (min-width: 1440px) {
    .kpi-bar__inner {
      padding-inline: var(--space-8);
    }
  }

  /* --- KPI Card augment: accent bar on top --- */
  .kpi-card {
    position: relative;
    overflow: hidden;
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background-color: var(--color-primary);
    opacity: 0;
    transition: opacity var(--transition-base);
  }

  .kpi-card.is-visible::before {
    opacity: 1;
  }

  /* --- Main sections scaffold --- */
  #main-content {
    max-width: 1200px;
    margin-inline: auto;
    padding-inline: var(--space-4);
    padding-block: var(--space-8);
  }

  @media (min-width: 768px) {
    #main-content {
      padding-inline: var(--space-6);
      padding-block: var(--space-10);
    }
  }

  @media (min-width: 1440px) {
    #main-content {
      padding-inline: var(--space-8);
    }
  }

  #main-content section {
    scroll-margin-top: 72px;
  }

  /* --- Light mode contrast fixes (WCAG AA) --- */
  [data-theme="light"] .kpi-card__label {
    color: var(--color-text);
  }

  [data-theme="light"] .site-nav__link {
    color: var(--color-text);
  }

  [data-theme="light"] .site-logo__title {
    color: var(--color-text);
  }


/* === TIMELINE === */

  /* ==========================================================
     TIMELINE SECTION
     ========================================================== */

  .timeline-section {
    padding-block: var(--space-10);
    border-top: var(--border);
  }

  .timeline-section__header {
    display: flex;
    align-items: baseline;
    gap: var(--space-4);
    margin-bottom: var(--space-6);
  }

  .timeline-section__title {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .timeline-section__count {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
  }

  /* ==========================================================
     DESKTOP TIMELINE (SVG via D3.js)
     ========================================================== */

  .timeline-svg-wrap {
    display: none;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  @media (min-width: 768px) {
    .timeline-svg-wrap {
      display: block;
    }
  }

  .timeline-svg-wrap svg {
    display: block;
    overflow: visible;
  }

  /* Tooltip */
  .timeline-tooltip {
    position: fixed;
    z-index: 200;
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    pointer-events: none;
    opacity: 0;
    transition: opacity 100ms ease;
    max-width: 280px;
    box-shadow: var(--shadow-md);
  }

  .timeline-tooltip.is-visible {
    opacity: 1;
  }

  .timeline-tooltip__company {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin-bottom: var(--space-1);
  }

  .timeline-tooltip__role {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .timeline-tooltip__duration {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
  }

  /* ==========================================================
     MOBILE TIMELINE (card list)
     ========================================================== */

  .timeline-mobile {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  @media (min-width: 768px) {
    .timeline-mobile {
      display: none;
    }
  }

  .timeline-card {
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-4);
    cursor: pointer;
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    position: relative;
    overflow: hidden;
    min-height: 44px;
  }

  .timeline-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background-color: var(--timeline-bar-color, var(--color-primary));
    border-radius: var(--radius-sm) 0 0 var(--radius-sm);
  }

  .timeline-card:hover {
    border-color: var(--color-primary);
    box-shadow: var(--shadow-sm);
  }

  .timeline-card:focus-visible {
    outline: 2px solid var(--color-primary);
    outline-offset: 2px;
  }

  .timeline-card__header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: var(--space-3);
    margin-bottom: var(--space-2);
  }

  .timeline-card__company {
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.3;
  }

  .timeline-card__current-badge {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
    border: 1px solid var(--color-primary);
    border-radius: var(--radius-full);
    padding: 0 var(--space-2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .timeline-card__role {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .timeline-card__dates {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    margin-bottom: var(--space-3);
  }

  .timeline-card__stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
  }

  /* ==========================================================
     DRILLDOWN PANEL
     ========================================================== */

  .drilldown-overlay {
    position: fixed;
    inset: 0;
    z-index: 300;
    background-color: var(--color-overlay);
    opacity: 0;
    transition: opacity 300ms ease-out;
    pointer-events: none;
  }

  .drilldown-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }

  .drilldown-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    z-index: 301;
    width: 100%;
    max-width: 100%;
    background-color: var(--color-surface);
    border-left: var(--border);
    overflow-y: auto;
    overflow-x: hidden;
    transform: translateX(100%);
    transition: transform 300ms ease-out;
    display: flex;
    flex-direction: column;
  }

  @media (min-width: 768px) {
    .drilldown-panel {
      width: 440px;
      max-width: 100%;
    }
  }

  .drilldown-panel.is-open {
    transform: translateX(0);
  }

  /* --- Panel header --- */
  .drilldown-panel__header {
    position: sticky;
    top: 0;
    z-index: 10;
    background-color: var(--color-surface);
    border-bottom: var(--border);
    padding: var(--space-4) var(--space-5);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-4);
  }

  .drilldown-panel__header-meta {
    min-width: 0;
    flex: 1;
  }

  .drilldown-panel__company {
    font-family: var(--font-display);
    font-size: var(--text-lg);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
    margin-bottom: var(--space-1);
  }

  .drilldown-panel__role {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    margin-bottom: var(--space-2);
  }

  .drilldown-panel__dates {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
  }

  .drilldown-panel__close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 44px;
    height: 44px;
    min-width: 44px;
    border-radius: var(--radius-md);
    color: var(--color-text-muted);
    background: none;
    border: none;
    cursor: pointer;
    transition: color var(--transition-fast), background-color var(--transition-fast);
    flex-shrink: 0;
  }

  .drilldown-panel__close:hover {
    color: var(--color-text);
    background-color: var(--color-surface-2);
  }

  .drilldown-panel__close svg {
    width: 18px;
    height: 18px;
  }

  /* --- Panel body --- */
  .drilldown-panel__body {
    padding: var(--space-5);
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: var(--space-6);
  }

  /* --- Sections within panel --- */
  .drilldown-section__label {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    font-weight: var(--weight-medium);
    color: var(--color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: var(--space-3);
  }

  /* Description */
  .drilldown-description {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text);
    line-height: 1.7;
  }

  /* Stack chips */
  .drilldown-stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  /* Impact bullets */
  .drilldown-impact {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .drilldown-impact__item {
    display: flex;
    gap: var(--space-3);
    align-items: flex-start;
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text);
    line-height: 1.6;
  }

  .drilldown-impact__bullet {
    display: inline-block;
    width: 5px;
    height: 5px;
    min-width: 5px;
    border-radius: var(--radius-full);
    background-color: var(--color-primary);
    margin-top: 8px;
    flex-shrink: 0;
  }

  /* Projects accordion */
  .drilldown-projects {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  .drilldown-project {
    background-color: var(--color-surface-2);
    border: var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .drilldown-project__toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    width: 100%;
    padding: var(--space-3) var(--space-4);
    background: none;
    border: none;
    cursor: pointer;
    text-align: left;
    min-height: 44px;
    transition: background-color var(--transition-fast);
  }

  .drilldown-project__toggle:hover {
    background-color: var(--color-surface-offset);
  }

  .drilldown-project__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-medium);
    color: var(--color-text);
    line-height: 1.3;
  }

  .drilldown-project__chevron {
    width: 16px;
    height: 16px;
    color: var(--color-text-muted);
    transition: transform var(--transition-fast);
    flex-shrink: 0;
  }

  .drilldown-project.is-open .drilldown-project__chevron {
    transform: rotate(180deg);
  }

  .drilldown-project__body {
    display: none;
    padding: 0 var(--space-4) var(--space-4);
    border-top: var(--border);
  }

  .drilldown-project.is-open .drilldown-project__body {
    display: block;
  }

  .drilldown-project__description {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    color: var(--color-text-muted);
    line-height: 1.65;
    padding-top: var(--space-3);
    margin-bottom: var(--space-3);
  }

  .drilldown-project__stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
    margin-bottom: var(--space-3);
  }

  .drilldown-project__outcome {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-primary);
    line-height: 1.5;
    padding: var(--space-2) var(--space-3);
    background-color: var(--color-surface);
    border-left: 2px solid var(--color-primary);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  }

  /* Overlay color tokens */
  :root {
    --color-overlay: rgba(0, 0, 0, 0.5);
  }

  [data-theme="light"] {
    --color-overlay: rgba(0, 0, 0, 0.3);
  }


/* === SKILLS === */

  /* -------------------------------------------------------
     SKILLS SECTION — scoped to .skills-section
     ------------------------------------------------------- */

  .skills-section {
    padding-block: var(--space-12);
  }

  /* Section header */
  .skills-section__header {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-8);
    border-bottom: var(--border);
    padding-bottom: var(--space-4);
  }

  .skills-section__title {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    line-height: 1.2;
  }

  .skills-section__subtitle {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  /* Categories grid: 1 col mobile, 2 col desktop */
  .skills-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-6);
  }

  @media (min-width: 768px) {
    .skills-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  /* Category card */
  .skill-category {
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    padding: var(--space-5);
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  /* Category header */
  .skill-category__header {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    padding-bottom: var(--space-3);
    border-bottom: var(--border);
  }

  .skill-category__accent {
    width: 3px;
    height: 16px;
    border-radius: var(--radius-full);
    flex-shrink: 0;
  }

  .skill-category__accent--data_engineering { background-color: var(--color-primary); }
  .skill-category__accent--visualization    { background-color: var(--color-blue); }
  .skill-category__accent--cloud            { background-color: var(--color-orange); }
  .skill-category__accent--languages        { background-color: var(--color-success); }
  .skill-category__accent--tools            { background-color: var(--color-purple); }

  .skill-category__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .skill-category__name--data_engineering { color: var(--color-primary); }
  .skill-category__name--visualization    { color: var(--color-blue); }
  .skill-category__name--cloud            { color: var(--color-orange); }
  .skill-category__name--languages        { color: var(--color-success); }
  .skill-category__name--tools            { color: var(--color-purple); }

  /* Skill list */
  .skill-list {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
  }

  /* Single skill row */
  .skill-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
    min-height: 44px;
    padding-block: var(--space-1);
    position: relative;
  }

  .skill-row__name {
    font-family: var(--font-mono);
    font-size: var(--text-sm);
    color: var(--color-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }

  /* SVG dot container */
  .skill-dots {
    display: flex;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
    position: relative;
    cursor: default;
  }

  /* Individual SVG dot wrapper — used for tooltip target */
  .skill-dots__dot-wrap {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Tooltip */
  .skill-dots__tooltip {
    position: absolute;
    bottom: calc(100% + 8px);
    right: 0;
    z-index: 20;
    background-color: var(--color-surface);
    border: 1px solid var(--color-divider);
    border-radius: var(--radius-md);
    padding: var(--space-2) var(--space-3);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateY(4px);
    transition: opacity var(--transition-fast), transform var(--transition-fast);
    box-shadow: var(--shadow-md);
  }

  .skill-dots:hover .skill-dots__tooltip,
  .skill-dots:focus-within .skill-dots__tooltip {
    opacity: 1;
    transform: translateY(0);
  }

  /* SVG dots — SVG circles drawn in JS */
  .skill-dots svg {
    display: block;
    overflow: visible;
  }

  /* Transition for fill animation */
  .skill-dot-circle {
    transition: fill 200ms ease-in-out;
  }


/* === CONTENT === */

  /* ============================================================
     SECCIÓN RESUMEN
     ============================================================ */

  #resumen {
    padding-block: var(--space-10) var(--space-8);
    border-bottom: var(--border);
    margin-bottom: var(--space-10);
  }

  .hero {
    display: flex;
    flex-direction: column;
    gap: var(--space-6);
  }

  @media (min-width: 768px) {
    .hero {
      flex-direction: row;
      align-items: flex-start;
      gap: var(--space-8);
    }
  }

  /* — Columna izquierda: nombre + título + ubicación — */
  .hero__identity {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  @media (min-width: 768px) {
    .hero__identity {
      min-width: 220px;
      max-width: 260px;
    }
  }

  .hero__name {
    font-family: var(--font-display);
    font-size: var(--text-3xl);
    font-weight: var(--weight-black);
    color: var(--color-text);
    line-height: 1.15;
    margin: 0;
  }

  @media (min-width: 768px) {
    .hero__name {
      font-size: var(--text-4xl);
    }
  }

  .hero__title {
    font-family: var(--font-display);
    font-size: var(--text-base);
    font-weight: var(--weight-regular);
    color: var(--color-text-muted);
    margin: 0;
  }

  .hero__location {
    display: flex;
    align-items: flex-start;
    gap: var(--space-2);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    line-height: 1.5;
    margin-top: var(--space-1);
  }

  .hero__location svg {
    flex-shrink: 0;
    margin-top: 2px;
    color: var(--color-primary);
  }

  /* — Columna central: summary — */
  .hero__summary {
    flex: 1 1 auto;
    min-width: 0;
  }

  .hero__summary p {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-regular);
    color: var(--color-text);
    line-height: 1.7;
    margin: 0;
  }

  @media (min-width: 768px) {
    .hero__summary p {
      font-size: var(--text-base);
    }
  }

  /* — Columna derecha: links + badges de idiomas — */
  .hero__aside {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: var(--space-4);
  }

  @media (min-width: 768px) {
    .hero__aside {
      min-width: 180px;
      align-items: flex-end;
    }
  }

  /* Contact links */
  .hero__contact {
    display: flex;
    flex-direction: column;
    gap: var(--space-2);
  }

  @media (min-width: 768px) {
    .hero__contact {
      align-items: flex-end;
    }
  }

  .hero__contact-link {
    display: inline-flex;
    align-items: center;
    gap: var(--space-2);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    text-decoration: none;
    min-height: 44px;
    padding-block: var(--space-2);
    transition: color var(--transition-fast);
  }

  .hero__contact-link:hover {
    color: var(--color-primary);
    text-decoration: none;
  }

  .hero__contact-link svg {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
  }

  .hero__contact-link--email {
    font-family: var(--font-mono);
  }

  /* Language chips in hero */
  .hero__lang-chips {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-2);
  }

  @media (min-width: 768px) {
    .hero__lang-chips {
      justify-content: flex-end;
    }
  }

  /* ============================================================
     SECCIÓN PROYECTOS
     ============================================================ */

  #proyectos {
    padding-block: var(--space-8);
    border-bottom: var(--border);
    margin-bottom: var(--space-10);
  }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: var(--space-3);
    margin-bottom: var(--space-6);
  }

  .section-header__title {
    font-family: var(--font-display);
    font-size: var(--text-xl);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin: 0;
  }

  .section-header__count {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
  }

  .projects-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: var(--space-4);
  }

  @media (min-width: 768px) {
    .projects-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (min-width: 1440px) {
    .projects-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }

  .project-card {
    display: flex;
    flex-direction: column;
    gap: var(--space-3);
    padding: var(--space-5);
    background-color: var(--color-surface);
    border: var(--border);
    border-radius: var(--radius-md);
    transition: border-color var(--transition-fast);
  }

  .project-card:hover {
    border-color: var(--color-primary);
  }

  .project-card__header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .project-card__name {
    font-family: var(--font-display);
    font-size: var(--text-sm);
    font-weight: var(--weight-bold);
    color: var(--color-text);
    margin: 0;
    line-height: 1.4;
  }

  .project-card__company {
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  [data-theme="light"] .project-card__company {
    color: var(--color-text-muted);
  }

  .project-card__description {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text-muted);
    line-height: 1.6;
    margin: 0;
    flex: 1;
  }

  .project-card__outcome {
    font-family: var(--font-display);
    font-size: var(--text-xs);
    color: var(--color-text);
    line-height: 1.5;
    padding: var(--space-2) var(--space-3);
    background-color: var(--color-surface-2);
    border-radius: var(--radius-sm);
    border-left: 2px solid var(--color-primary);
  }

  .project-card__stack {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-1);
    margin-top: auto;
  }

  .project-card__link {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    font-family: var(--font-mono);
    font-size: var(--text-xs);
    color: var(--color-primary);
    text-decoration: none;
    min-height: 44px;
    padding-block: var(--space-2);
    transition: opacity var(--transition-fast);
  }

  .project-card__link:hover {
    opacity: 0.75;
    text-decoration: none;
  }

  /* ============================================================
     SECCIÓN EDUCACIÓN (+ CERTS + IDIOMAS + RECONOCIMIENTOS)
     ============================================================ */

  #educacion {
    padding-block: var(--space-8);
    margin-bottom: var(--space-10);
  }

  /* Subsecciones dentro de #educacion */
  .edu-block {
    margin-bottom: var(--space-10);
  }

  .edu-block:last-child {
    margin-bottom: 0;
  }

  /* Education cards */
  .edu-list {
    display: flex;

/* =============================================================================
   06-print.css — PrintAgent
   CSS de impresión — exportar el CV como PDF limpio desde el navegador
   Solo @media print { ... } — fragmento parcial inyectado por AssemblerAgent
   Sin <style> tags
   ============================================================================= */

@media print {

  /* ===========================================================================
     @PAGE — MÁRGENES Y TAMAÑO
     =========================================================================== */

  @page {
    size: A4 portrait;
    margin: 16mm 18mm 20mm 18mm;
  }

  @page :first {
    margin-top: 12mm;
  }

  /* ===========================================================================
     FORZAR LIGHT MODE — override variables incluso con [data-theme="dark"]
     Las CSS custom properties se redefinen aquí para que toda la hoja de
     impresión use valores de alto contraste sobre blanco.
     =========================================================================== */

  :root,
  [data-theme="dark"],
  [data-theme="light"] {
    --color-bg:             white;
    --color-surface:        white;
    --color-surface-2:      #f0f0f0;
    --color-surface-offset: #d8d8d8;
    --color-text:           black;
    --color-text-muted:     #444444;
    --color-divider:        #cccccc;
    --color-primary:        #2a6a73;
    --color-blue:           #1a5fa8;
    --color-orange:         #b05c10;
    --color-success:        #1a7a28;
    --color-purple:         #6a3ab0;
    --shadow-sm:            none;
    --shadow-md:            none;
    --border:               1px solid var(--color-divider);
    --font-display:         'Satoshi', sans-serif;
    --font-mono:            'JetBrains Mono', monospace;
    --transition-fast:      0ms;
    --transition-base:      0ms;
  }

  /* ===========================================================================
     RESET GLOBAL DE IMPRESIÓN
     =========================================================================== */

  *,
  *::before,
  *::after {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
    box-shadow: none !important;
    text-shadow: none !important;
    transition: none !important;
    animation: none !important;
  }

  html {
    font-size: 11pt;
  }

  body {
    background: white !important;
    color: black !important;
    font-family: var(--font-display) !important;
    font-size: 10pt !important;
    line-height: 1.5 !important;
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    overflow: visible !important;
    min-height: auto !important;
    -webkit-font-smoothing: auto !important;
  }

  /* ===========================================================================
     ELEMENTOS A OCULTAR COMPLETAMENTE
     =========================================================================== */

  /* Header sticky de navegación */
  .site-header,
  .site-header__inner {
    display: none !important;
  }

  /* Navegación desktop y mobile */
  .site-nav,
  .mobile-nav {
    display: none !important;
  }

  /* Botones de acción en header */
  .btn-icon,
  .btn-lang,
  .btn-download,
  .btn-hamburger,
  .theme-toggle,
  #btn-theme,
  #btn-lang,
  #btn-download-desktop,
  #btn-hamburger {
    display: none !important;
  }

  /* KPI bar animada (no aporta en impresión) */
  .kpi-bar {
    display: none !important;
  }

  /* Tooltip del timeline D3 */
  .timeline-tooltip {
    display: none !important;
  }

  /* Tooltip de skill dots */
  .skill-dots__tooltip {
    display: none !important;
  }

  /* Drilldown panel y overlay (elemento modal) */
  .drilldown-overlay,
  .drilldown-panel {
    display: none !important;
  }

  /* SVG timeline D3 — no imprime bien (requiere viewport, escala, interactividad) */
  .timeline-svg-wrap {
    display: none !important;
  }

  /* ===========================================================================
     LAYOUT DE IMPRESIÓN — UNA COLUMNA, SIN GRIDS COMPLEJOS
     =========================================================================== */

  #main-content {
    max-width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
  }

  #main-content section {
    scroll-margin-top: 0 !important;
  }

  /* Grids multi-columna → una columna en impresión */
  .skills-grid,
  .projects-grid,
  .cert-grid {
    display: grid !important;
    grid-template-columns: 1fr !important;
    gap: 8pt !important;
  }

  /* Hero: una columna */
  .hero {
    flex-direction: column !important;
    gap: 8pt !important;
  }

  .hero__identity {
    min-width: auto !important;
    max-width: 100% !important;
  }

  .hero__aside {
    min-width: auto !important;
    align-items: flex-start !important;
  }

  .hero__contact {
    align-items: flex-start !important;
  }

  /* ===========================================================================
     TIMELINE EN IMPRESIÓN — MOSTRAR LISTA MOBILE, OCULTAR D3
     =========================================================================== */

  /* La lista mobile (.timeline-mobile) está hidden en desktop (display:none).
     En impresión la forzamos visible para reemplazar al SVG D3. */
  .timeline-mobile {
    display: flex !important;
    flex-direction: column !important;
    gap: 8pt !important;
  }

  /* Simplificar cards de timeline para impresión */
  .timeline-card {
    border: 1pt solid var(--color-divider) !important;
    border-radius: 4pt !important;
    padding: 8pt 10pt !important;
    cursor: default !important;
    break-inside: avoid !important;
    page-break-inside: avoid !important;
    background: white !important;
  }

  /* Eliminar el pseudo-elemento barra izquierda de color en impresión
     (depende de CSS custom property inline —timeline-bar-color— y puede
     no renderizarse correctamente en todos los motores PDF) */
  .timeline-card::before {
    display: none !important;
  }

  /* Quitar pading left extra que compensa la barra */
  .timeline-section__header {
    margin-bottom: 8pt !important;
  }

  /* ===========================================================================
     SKILL DOTS — SVG VISIBLE EN IMPRESIÓN
     =========================================================================== */

  /* Asegurar que los círculos SVG impriman con color */
  .skill-dots svg,
  .skill-dot-circle {
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
    color-adjust: exact !important;
  }

  /* Contenedor de dots: cursor default */
  .skill-dots {
    cursor: default !important;
  }

  /* Forzar visibilidad de los dots y su contenedor */
  .skill-dots,
  .skill-dots svg {
    display: inline-flex !important;
    visibility: visible !important;
    opacity: 1 !important;
  }

  /* ===========================================================================
     SUPERFICIES Y CARDS — SIMPLIFICAR BORDES
     =========================================================================== */

  .surface,
  .surface-2,
  .surface-offset,
  .skill-category,
  .timeline-card,
  .project-card,
  .edu-card,
  .cert-card,
  .honor-card {
    background: white !important;
    border: 1pt solid var(--color-divider) !important;
    box-shadow: none !important;
  }

  /* Eliminar pseudo-elementos decorativos que no imprimen bien */
  .kpi-card::before {
    display: none !important;
  }

  /* ===========================================================================
     TIPOGRAFÍA DE IMPRESIÓN
     =========================================================================== */

  /* Fallback a sistema si las web fonts no cargan */
  .font-display,
  .site-logo__name,
  .site-logo__title,
  .hero__name,
  .hero__title,
  .section-header__title,
  .timeline-section__title,
  .skills-section__title,
  .skill-category__name,
  .timeline-card__company,
  .drilldown-panel__company,
  .project-card__name,
  .edu-card__institution,
  .edu-card__degree,
  .cert-card__name,
  .honor-card__name {
    font-family: var(--font-display) !important;
  }

  .font-mono,
  .timeline-card__dates,
  .skill-row__name,
  .badge,
  .chip,
  .edu-card__years,
  .cert-card__meta,
  .honor-card__meta,
  .kpi-card__value,
  .section-header__count {
    font-family: var(--font-mono) !important;
  }

  /* Tamaños de texto en impresión */
  .hero__name {
    font-size: 20pt !important;
    line-height: 1.15 !important;
  }

  .hero__title {
    font-size: 11pt !important;
  }

  .section-header__title,
  .timeline-section__title,
  .skills-section__title {
    font-size: 13pt !important;
  }

  .skill-row__name,
  .timeline-card__company,
  .project-card__name,
  .edu-card__institution {
    font-size: 9pt !important;
  }

  .badge,
  .chip {
    font-size: 7pt !important;
    padding: 1pt 3pt !important;
  }

  /* Links visibles en impresión */
  a {
    color: black !important;
    text-decoration: none !important;
  }

  /* Mostrar URL de links de contacto y certificaciones */
  .hero__contact-link[href^="mailto:"]::after {
    content: " (" attr(href) ")";
    font-size: 7pt;
    color: var(--color-text-muted);
  }

  .cert-link[href]::after {
    display: none; /* Las URLs de certificados son largas — omitir */
  }

  /* ===========================================================================
     SALTOS DE PÁGINA
     =========================================================================== */

  /* Evitar que una sección quede partida entre páginas */
  section {
    break-inside: avoid !important;
    page-break-inside: avoid !important;
  }

  /* Educación siempre empieza en nueva página */
  #educacion {
    break-before: always !important;
    page-break-before: always !important;
  }

  /* Evitar que cards queden partidas */
  .timeline-card,
  .skill-category,
  .project-card,
  .edu-card,
  .cert-card,
  .honor-card,
  .edu-block {
    break-inside: avoid !important;
    page-break-inside: avoid !important;
  }

  /* Evitar heading huérfano al final de página */
  .section-header,
  .timeline-section__header,
  .skills-section__header {
    break-after: avoid !important;
    page-break-after: avoid !important;
  }

  /* ===========================================================================
     CONTENIDO TRADUCIDO — NO OCULTAR
     Los elementos con data-i18n ya tienen su textContent renderizado
     por applyStaticLabels() antes de abrir el diálogo de impresión.
     El CSS no fuerza ningún idioma — muestra el contenido activo.
     =========================================================================== */

  [data-i18n],
  [data-i18n-aria] {
    visibility: visible !important;
    display: revert !important;
  }

  /* ===========================================================================
     OVERFLOW Y SCROLL — ELIMINAR
     =========================================================================== */

  body,
  #main-content,
  .timeline-section,
  .skills-section,
  #resumen,
  #proyectos,
  #educacion {
    overflow: visible !important;
    max-width: 100% !important;
  }

  /* Scrollable wrapper del SVG — ya oculto, pero por si acaso */
  .timeline-svg-wrap {
    overflow: visible !important;
  }

  /* ===========================================================================
     SCROLL-SPY ACTIVE STATE — LIMPIAR
     =========================================================================== */

  .site-nav__link.is-active {
    color: black !important;
    background-color: transparent !important;
  }

}

/**
 * Helper de internacionalización.
 *
 * Lee un valor que puede ser:
 *   - string plano  → se devuelve tal cual (ej. tech names, fechas, nombres propios)
 *   - { es, en }    → se devuelve la versión del idioma activo, con fallback a `es`
 *   - undefined/null → se devuelve "" para evitar "undefined" en pantalla
 *
 * Uso:
 *   t(CV_DATA.profile.summary)
 *   t(CV_DATA.ui.nav.experience)
 *   t(experience.role)
 */
function t(value, lang) {
  lang = lang || (typeof window !== "undefined" && window.__cvLang) || CV_DATA.meta.default_language;
  if (value == null) return "";
  if (typeof value === "object" && !Array.isArray(value) && (value.es !== undefined || value.en !== undefined)) {
    return value[lang] != null ? value[lang] : (value.es != null ? value.es : Object.values(value)[0]);
  }
  return value;
}

  /* -------------------------------------------------------
     10. KPI COUNT-UP ANIMATION (IntersectionObserver)
     ------------------------------------------------------- */
  function _easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function _countUp(displayEl, target, duration) {
    var start = null;
    var startValue = 0;

    function _step(timestamp) {
      if (!start) start = timestamp;
      var elapsed = timestamp - start;
      var progress = Math.min(elapsed / duration, 1);
      var eased = _easeOutCubic(progress);
      var current = Math.round(startValue + (target - startValue) * eased);
      displayEl.textContent = current;
      if (progress < 1) {
        window.requestAnimationFrame(_step);
      } else {
        displayEl.textContent = target;
      }
    }

    window.requestAnimationFrame(_step);
  }

  var _kpiAnimated = false;

  function _animateKPIs() {
    if (_kpiAnimated) return;
    _kpiAnimated = true;

    var cards = document.querySelectorAll(".kpi-card[data-kpi-value]");
    cards.forEach(function (card, index) {
      var target = parseInt(card.dataset.kpiValue, 10);
      var displayEl = card.querySelector("[data-kpi-display]");
      if (!displayEl || isNaN(target)) return;

      card.classList.add("is-visible");

      // Stagger each card slightly
      var delay = index * 80;
      setTimeout(function () {
        _countUp(displayEl, target, 1500);
      }, delay);
    });
  }

  var kpiBar = document.getElementById("kpi-bar");
  if (kpiBar && "IntersectionObserver" in window) {
    var kpiObserver = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          _animateKPIs();
          kpiObserver.disconnect();
        }
      });
    }, { threshold: 0.2 });
    kpiObserver.observe(kpiBar);
  } else if (kpiBar) {
    // Fallback for environments without IntersectionObserver
    _animateKPIs();
  }

  applyStaticLabels();
  _updateActiveNav();

})();

  function parseYearMonth(str) {
    // "2025-01" → Date at first day of month
    if (!str) return new Date();
    var parts = str.split("-");
    return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, 1);
  }

  function today() {
    var d = new Date();
    return new Date(d.getFullYear(), d.getMonth(), 1);
  }

  function formatDateRange(exp) {
    var lang = window.__cvLang || "es";
    var months = UI.months[lang];

    var startDate = parseYearMonth(exp.start);
    var endDate = exp.current ? today() : parseYearMonth(exp.end);

    var startStr = months[startDate.getMonth()] + " " + startDate.getFullYear();
    var endStr = exp.current
      ? t(UI.timeline.today)
      : months[endDate.getMonth()] + " " + endDate.getFullYear();

    return startStr + " — " + endStr;
  }

  function calcDuration(exp) {
    var lang = window.__cvLang || "es";
    var startDate = parseYearMonth(exp.start);
    var endDate = exp.current ? today() : parseYearMonth(exp.end);

    var months = (endDate.getFullYear() - startDate.getFullYear()) * 12
      + (endDate.getMonth() - startDate.getMonth());

    var years = Math.floor(months / 12);
    var remainMonths = months % 12;

    var parts = [];
    if (years > 0) {
      parts.push(years + " " + t(years === 1 ? UI.timeline.duration_year : UI.timeline.duration_years));
    }
    if (remainMonths > 0) {
      parts.push(remainMonths + " " + t(remainMonths === 1 ? UI.timeline.duration_month : UI.timeline.duration_months));
    }
    return parts.join(" ") || "—";

    var LABEL_FONT_SIZE = 12;

    var numRows = EXPERIENCE.length;
    var innerHeight = numRows * (ROW_HEIGHT + ROW_GAP) - ROW_GAP;
    var totalHeight = innerHeight + MARGIN.top + MARGIN.bottom;
    var innerWidth = totalWidth - MARGIN.left - MARGIN.right;

    // Time domain: from earliest start to today
    var allStarts = EXPERIENCE.map(function (e) { return parseYearMonth(e.start); });
    var domainStart = d3.min(allStarts);
    var domainEnd = today();
    // Add a tiny right padding (1 month)
    var domainEndPadded = new Date(domainEnd.getFullYear(), domainEnd.getMonth() + 2, 1);

    var xScale = d3.scaleTime()
      .domain([domainStart, domainEndPadded])
      .range([0, innerWidth]);

    // SVG
    var svg = d3.select(wrap)
      .append("svg")
      .attr("width", totalWidth)
      .attr("height", totalHeight)
      .attr("role", "img")
      .attr("aria-label", t(UI.nav.experience));

    var g = svg.append("g")
      .attr("transform", "translate(" + MARGIN.left + "," + MARGIN.top + ")");

    // X Axis — only year ticks
    var xAxis = d3.axisBottom(xScale)
      .ticks(d3.timeYear.every(1))
      .tickFormat(d3.timeFormat("%Y"))
      .tickSize(4);

    g.append("g")
      .attr("transform", "translate(0," + innerHeight + ")")
      .call(xAxis)
      .call(function (axisG) {
        axisG.select(".domain").attr("stroke", "var(--color-divider)");
        axisG.selectAll(".tick line").attr("stroke", "var(--color-divider)");
        axisG.selectAll(".tick text")
          .attr("fill", "var(--color-text-muted)")
          .attr("font-family", "var(--font-mono)")
          .attr("font-size", LABEL_FONT_SIZE + "px");
      });

    // Horizontal grid lines
    EXPERIENCE.forEach(function (exp, i) {
      var y = i * (ROW_HEIGHT + ROW_GAP) + ROW_HEIGHT / 2;
      g.append("line")
        .attr("x1", 0)
        .attr("x2", innerWidth)
        .attr("y1", y)
        .attr("y2", y)
        .attr("stroke", "var(--color-divider)")
        .attr("stroke-width", 1)
        .attr("stroke-dasharray", "2,4");
    });

    // Today line
    var todayX = xScale(today());

    g.append("line")
      .attr("x1", todayX)
      .attr("x2", todayX)
      .attr("y1", -MARGIN.top + 4)
      .attr("y2", innerHeight)
      .attr("stroke", "var(--color-primary)")
      .attr("stroke-width", 1.5)
      .attr("stroke-dasharray", "4,3")
      .attr("opacity", 0.7);

    // "Hoy" label
    var todayLabel = t(UI.timeline.today);
    g.append("text")
      .attr("x", todayX + 4)
      .attr("y", -MARGIN.top + 14)
      .attr("fill", "var(--color-primary)")
      .attr("font-family", "var(--font-mono)")
      .attr("font-size", "12px")
      .text(todayLabel);

    // Tooltip
    var tooltip = document.getElementById("timeline-tooltip");
    var ttCompany = document.getElementById("tt-company");
    var ttRole = document.getElementById("tt-role");
    var ttDuration = document.getElementById("tt-duration");

    // Bars
    EXPERIENCE.forEach(function (exp, i) {
      var color = COMPANY_COLORS[i % COMPANY_COLORS.length];
      var startX = xScale(parseYearMonth(exp.start));
      var endDate = exp.current ? today() : parseYearMonth(exp.end);
      var endX = xScale(endDate);
      var barWidth = Math.max(endX - startX, 4);
      var barY = i * (ROW_HEIGHT + ROW_GAP);

      // Label group (company + role) — interactive: same hover/click as the bar
      var labelGroup = g.append("g")
        .attr("class", "timeline-label-group")
        .style("cursor", "pointer");

      // Company label — line 1 (left margin)
      var companyFull = exp.company;
      var companyText = companyFull.length > 24 ? companyFull.slice(0, 22) + "…" : companyFull;

      var companyEl = labelGroup.append("text")
        .attr("x", -8)
        .attr("y", barY + ROW_HEIGHT / 2 - 5)
        .attr("text-anchor", "end")
        .attr("fill", "var(--color-text)")
        .attr("font-family", "var(--font-display)")
        .attr("font-weight", "600")
        .attr("font-size", LABEL_FONT_SIZE + "px")
        .text(companyText);
      companyEl.append("title").text(companyFull);

      // Role label — line 2 (left margin, muted)
      var roleFull = t(exp.role);
      var roleText = roleFull.length > 28 ? roleFull.slice(0, 26) + "…" : roleFull;

      var roleEl = labelGroup.append("text")
        .attr("x", -8)
        .attr("y", barY + ROW_HEIGHT / 2 + 10)
        .attr("text-anchor", "end")
        .attr("fill", "var(--color-text-muted)")
        .attr("font-family", "var(--font-mono)")
        .attr("font-size", LABEL_FONT_SIZE + "px")
        .text(roleText);
      roleEl.append("title").text(roleFull);

      // Transparent hit area for the label group (full margin width, row-tall)
      labelGroup.append("rect")
        .attr("x", -MARGIN.left + 4)
        .attr("y", barY - (44 - ROW_HEIGHT) / 2)
        .attr("width", MARGIN.left - 12)
        .attr("height", 44)
        .attr("fill", "transparent")
        .attr("data-exp-id", exp.id);

      labelGroup.on("mousemove", function (event) {
        ttCompany.textContent = exp.company;
        ttRole.textContent = t(exp.role);
        ttDuration.textContent = formatDateRange(exp) + " · " + calcDuration(exp);
        tooltip.classList.add("is-visible");
        tooltip.setAttribute("aria-hidden", "false");
        _positionTooltip(event.clientX, event.clientY);
        companyEl.attr("fill", "var(--color-primary)");
      });

      labelGroup.on("mouseleave", function () {
        tooltip.classList.remove("is-visible");
        tooltip.setAttribute("aria-hidden", "true");
        companyEl.attr("fill", "var(--color-text)");
      });

      labelGroup.on("click", function () {
        tooltip.classList.remove("is-visible");
        openDrilldown(exp.id);
      });

      // Bar background (clickable hit area)
      var barGroup = g.append("g")
        .attr("class", "timeline-bar-group")
        .style("cursor", "pointer");

      // Bar rect
      barGroup.append("rect")
        .attr("x", startX)
        .attr("y", barY)
        .attr("width", barWidth)
        .attr("height", ROW_HEIGHT)
        .attr("rx", 4)
        .attr("fill", color)
        .attr("opacity", 0.25)
        .attr("data-exp-id", exp.id);

      // Bar border / accent line (top)
      barGroup.append("rect")
        .attr("x", startX)
        .attr("y", barY)
        .attr("width", barWidth)
        .attr("height", 2)
        .attr("rx", 1)
        .attr("fill", color)
        .attr("opacity", 0.85);

      // Transparent hit area — 44px tall, centred over the bar
      var HIT_HEIGHT = 44;
      barGroup.append("rect")
        .attr("x", startX)
        .attr("y", barY - (HIT_HEIGHT - ROW_HEIGHT) / 2)
        .attr("width", barWidth)
        .attr("height", HIT_HEIGHT)
        .attr("fill", "transparent")
        .attr("data-exp-id", exp.id);

      // Hover
      barGroup.on("mousemove", function (event) {
        ttCompany.textContent = exp.company;
        ttRole.textContent = t(exp.role);
        ttDuration.textContent = formatDateRange(exp) + " · " + calcDuration(exp);
        tooltip.classList.add("is-visible");
        tooltip.setAttribute("aria-hidden", "false");
        _positionTooltip(event.clientX, event.clientY);
      });

      barGroup.on("mouseleave", function () {
        tooltip.classList.remove("is-visible");
        tooltip.setAttribute("aria-hidden", "true");
      });

      barGroup.on("click", function () {
        tooltip.classList.remove("is-visible");
        openDrilldown(exp.id);
      });

      // Keyboard accessibility via foreignObject workaround:
      // We add a title element for screen reader hint
      barGroup.append("title")
        .text(exp.company + " — " + t(exp.role) + " · " + calcDuration(exp));
    });
  }

  function _positionTooltip(clientX, clientY) {
    var tooltip = document.getElementById("timeline-tooltip");
    var vw = window.innerWidth;
    var vh = window.innerHeight;
    var tw = tooltip.offsetWidth || 240;
    var th = tooltip.offsetHeight || 80;
    var offset = 14;

    var left = clientX + offset;
    var top = clientY + offset;

    if (left + tw > vw - 8) left = clientX - tw - offset;
    if (top + th > vh - 8) top = clientY - th - offset;

    tooltip.style.left = left + "px";
    tooltip.style.top = top + "px";
  }

  /* ----------------------------------------------------------
     SECTION HEADER
  ---------------------------------------------------------- */
  function renderHeader() {
    var title = document.getElementById("timeline-section-title");
    var count = document.getElementById("timeline-count");
    if (title) title.textContent = t(UI.nav.experience);
    if (count) count.textContent = EXPERIENCE.length;
  }

  /* ----------------------------------------------------------
     FULL RENDER
  ---------------------------------------------------------- */
  function renderAll() {
    renderHeader();
    renderMobileList();

    // D3 only on desktop
    if (window.innerWidth >= 768 && typeof d3 !== "undefined") {
      renderD3Timeline();
    }

    // If there's a matching hash on load, open drilldown
    var hash = window.location.hash.replace("#", "");
    if (hash && EXPERIENCE.find(function (e) { return e.id === hash; })) {
      openDrilldown(hash);
    }
  }

  /* ----------------------------------------------------------
     LANGUAGE CHANGE LISTENER
  ---------------------------------------------------------- */
  window.addEventListener("cv:languagechange", function () {
    renderHeader();
    renderMobileList();
    if (window.innerWidth >= 768 && typeof d3 !== "undefined") {
      renderD3Timeline();
    }
    // Re-render drilldown content if one is open
    if (_openExpId) {
      var exp = EXPERIENCE.find(function (e) { return e.id === _openExpId; });
      if (exp) renderDrilldownContent(exp);
    }
  });

  /* ----------------------------------------------------------
     RESIZE HANDLER — re-render D3 on viewport width change
  ---------------------------------------------------------- */
  var _resizeTimer;
  window.addEventListener("resize", function () {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(function () {
      if (window.innerWidth >= 768 && typeof d3 !== "undefined") {
        renderD3Timeline();
      }
    }, 200);
  });

  /* ----------------------------------------------------------
     INIT
  ---------------------------------------------------------- */
  // D3 may not be loaded yet — wait for it
  function _waitForD3AndRender() {
    if (typeof d3 !== "undefined") {
      renderAll();
    } else {
      setTimeout(_waitForD3AndRender, 50);
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", _waitForD3AndRender);
  } else {
    _waitForD3AndRender();
  }

})();


(function () {
  "use strict";

  /* -------------------------------------------------------
     COLOR MAP — categoria → CSS var (per spec)
     ------------------------------------------------------- */
  var CATEGORY_COLORS = {
    data_engineering: "var(--color-primary)",
    visualization:    "var(--color-blue)",
    cloud:            "var(--color-orange)",
    languages:        "var(--color-success)",
    tools:            "var(--color-purple)"
  };

  /* -------------------------------------------------------
     CATEGORY ORDER (deterministic render order)
     ------------------------------------------------------- */
  var CATEGORY_ORDER = [
    "data_engineering",
    "visualization",
    "cloud",
    "languages",
    "tools"
  ];

  /* -------------------------------------------------------
     SVG DOT BUILDER
     Builds a row of 5 SVG circles. Starts all empty.
     Returns { svg, circles[] } for later animation.
     ------------------------------------------------------- */
  var DOT_R      = 6;   // radius px
  var DOT_GAP    = 4;   // gap px
  var DOT_DIAM   = DOT_R * 2;
  var DOT_STEP   = DOT_DIAM + DOT_GAP;
  var DOT_TOTAL  = 5;
  var SVG_W      = DOT_TOTAL * DOT_STEP - DOT_GAP;  // 68px
  var SVG_H      = DOT_DIAM;                         // 12px

  function _buildDotSVG(level, filledColor) {
    var ns = "http://www.w3.org/2000/svg";
    var svg = document.createElementNS(ns, "svg");
    svg.setAttribute("width", SVG_W);
    svg.setAttribute("height", SVG_H);
    svg.setAttribute("viewBox", "0 0 " + SVG_W + " " + SVG_H);
    svg.setAttribute("aria-hidden", "true");
    svg.setAttribute("focusable", "false");

    var circles = [];
    for (var i = 0; i < DOT_TOTAL; i++) {
      var cx = DOT_R + i * DOT_STEP;
      var cy = DOT_R;

      var circle = document.createElementNS(ns, "circle");
      circle.setAttribute("cx", cx);
      circle.setAttribute("cy", cy);
      circle.setAttribute("r", DOT_R);
      circle.setAttribute("class", "skill-dot-circle");
      // All dots start empty — animation fills them
      circle.setAttribute("fill", "var(--color-surface-2)");
      circle.setAttribute("stroke", "var(--color-surface-offset)");
      circle.setAttribute("stroke-width", "1");

      svg.appendChild(circle);
      circles.push(circle);
    }

    return { svg: svg, circles: circles, level: level, color: filledColor };
  }

  /* -------------------------------------------------------
     TOOLTIP STRING
     ------------------------------------------------------- */
  function _buildTooltipText(skill) {
    var fmt = t(CV_DATA.ui.skills.tooltip_format);
    return fmt
      .replace("{years}", skill.years)
      .replace("{level}", skill.level);
  }

  /* -------------------------------------------------------
     RENDER — builds the full grid DOM
     Returns array of dot records for the IntersectionObserver
     ------------------------------------------------------- */
  var _allDotRecords = []; // { circles, level, color, animated }

  function _renderGrid() {
    var grid = document.getElementById("skills-grid");
    if (!grid) return;

    grid.innerHTML = "";
    _allDotRecords = [];

    CATEGORY_ORDER.forEach(function (cat) {
      var skills = CV_DATA.skills[cat];
      if (!skills || !skills.length) return;

      var color = CATEGORY_COLORS[cat] || "var(--color-primary)";
      var categoryLabel = t(CV_DATA.ui.skills.categories[cat]);

      /* --- Category card --- */
      var card = document.createElement("div");
      card.className = "skill-category";
      card.setAttribute("role", "listitem");
      card.setAttribute("data-category", cat);

      /* --- Category header --- */
      var header = document.createElement("div");
      header.className = "skill-category__header";

      var accent = document.createElement("span");
      accent.className = "skill-category__accent skill-category__accent--" + cat;
      accent.setAttribute("aria-hidden", "true");

      var nameEl = document.createElement("span");
      nameEl.className = "skill-category__name skill-category__name--" + cat;
      nameEl.textContent = categoryLabel;
      nameEl.setAttribute("data-category-key", cat);

      header.appendChild(accent);
      header.appendChild(nameEl);
      card.appendChild(header);

      /* --- Skill list --- */
      var list = document.createElement("ul");
      list.className = "skill-list";

      skills.forEach(function (skill) {
        var li = document.createElement("li");
        li.className = "skill-row";

        /* Skill name */
        var nameSpan = document.createElement("span");
        nameSpan.className = "skill-row__name";
        nameSpan.textContent = skill.name;

        /* Dots container with tooltip */
        var dotsWrap = document.createElement("div");
        dotsWrap.className = "skill-dots";
        dotsWrap.setAttribute("role", "img");
        dotsWrap.setAttribute("aria-label", skill.name + " — " + _buildTooltipText(skill));
        dotsWrap.setAttribute("tabindex", "0");
        dotsWrap.setAttribute("data-skill-name", skill.name);
        dotsWrap.setAttribute("data-years", skill.years);
        dotsWrap.setAttribute("data-level", skill.level);

        /* Tooltip element */
        var tooltip = document.createElement("span");
        tooltip.className = "skill-dots__tooltip";
        tooltip.setAttribute("role", "tooltip");
        tooltip.setAttribute("aria-hidden", "true");
        tooltip.textContent = _buildTooltipText(skill);
        tooltip.setAttribute("data-tooltip-skill", skill.name);

        /* SVG dots */
        var dotRecord = _buildDotSVG(skill.level, color);
        _allDotRecords.push({ circles: dotRecord.circles, level: dotRecord.level, color: dotRecord.color, animated: false });

        dotsWrap.appendChild(dotRecord.svg);
        dotsWrap.appendChild(tooltip);

        li.appendChild(nameSpan);
        li.appendChild(dotsWrap);
        list.appendChild(li);
      });

      card.appendChild(list);
      grid.appendChild(card);
    });
  }

  /* -------------------------------------------------------
     ANIMATION — fills dots progressively, left to right
     Only fires once per record (animated flag guard)
     ------------------------------------------------------- */
  var DELAYS = [0, 80, 160, 240, 320]; // ms per dot

  function _animateDotRecord(record) {
    if (record.animated) return;
    record.animated = true;

    for (var i = 0; i < DOT_TOTAL; i++) {
      (function (circle, idx, level, color) {
        setTimeout(function () {
          if (idx < level) {
            circle.setAttribute("fill", color);
            circle.setAttribute("stroke", color);
          }
          // dots beyond level keep their empty style — no-op
        }, DELAYS[idx]);
      })(record.circles[i], i, record.level, record.color);
    }
  }

  /* -------------------------------------------------------
     INTERSECTION OBSERVER — triggers on viewport entry
     threshold: 0.3, fires once (disconnect after animation)
     ------------------------------------------------------- */
  function _setupObserver() {
    var grid = document.getElementById("skills-grid");
    if (!grid) return;

    if (!("IntersectionObserver" in window)) {
      // Fallback: animate immediately
      _allDotRecords.forEach(_animateDotRecord);
      return;
    }

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          _allDotRecords.forEach(_animateDotRecord);
          observer.disconnect();
        }
      });
    }, { threshold: 0.3 });

    observer.observe(grid);
  }

  /* -------------------------------------------------------
     i18n — re-render labels on language change
     Dot SVGs are NOT re-rendered (color stays, tooltips update)
     ------------------------------------------------------- */
  function _refreshLabels() {
    // Category name labels
    document.querySelectorAll("[data-category-key]").forEach(function (el) {
      var cat = el.getAttribute("data-category-key");
      var label = CV_DATA.ui.skills.categories[cat];
      if (label) el.textContent = t(label);
    });

    // Tooltip strings and aria-labels
    document.querySelectorAll(".skill-dots[data-skill-name]").forEach(function (wrap) {
      var years = parseInt(wrap.getAttribute("data-years"), 10);
      var level = parseInt(wrap.getAttribute("data-level"), 10);
      var name  = wrap.getAttribute("data-skill-name");

      var fmt = t(CV_DATA.ui.skills.tooltip_format);
      var tooltipText = fmt
        .replace("{years}", years)
        .replace("{level}", level);

      wrap.setAttribute("aria-label", name + " — " + tooltipText);

      var tooltipEl = wrap.querySelector(".skill-dots__tooltip");
      if (tooltipEl) tooltipEl.textContent = tooltipText;
    });
  }

  window.addEventListener("cv:languagechange", _refreshLabels);

  /* -------------------------------------------------------
     INIT
     ------------------------------------------------------- */
  function _init() {
    _renderGrid();
    _setupObserver();
  }

  // Run after current paint (grid scaffold already in DOM)
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", _init);
  } else {
    _init();
  }

})();
